// ─── APP PRINCIPAL ─────────────────────────────────────────
function App(){
  // ── Auth ──────────────────────────────────────────────
  const [authed,setAuthed]=useState(false);
  const [delivery,setDelivery]=useState(null);
  // ── UI ────────────────────────────────────────────────
  const [tab,setTab]=useState('asignados');
  const [sideOpen,setSideOpen]=useState(false);
  const [detalle,setDetalle]=useState(null);
  const [sheet,setSheet]=useState(null);
  const [toastMsg,setToastMsg]=useState('');
  const [ahora,setAhora]=useState(Date.now());
  const [chatUnread,setChatUnread]=useState(0);
  // ── Datos ────────────────────────────────────────────
  const [pedidos,setPedidos]=useState([]);
  const [historial,setHistorial]=useState([]);
  const [depositos,setDepositos]=useState([]);
  const [movimientos,setMovimientos]=useState([]);
  const [saldo,setSaldo]=useState(0);
  const [notifs,setNotifs]=useState([]);
  const [showNotifs,setShowNotifs]=useState(false);
  const [turno,setTurno]=useState(false);
  const [pausado,setPausado]=useState(false);
  const [pe,setPe]=useState(null);
  // ── Refs ─────────────────────────────────────────────
  const gpsRef=useRef(null);
  const rtRef=useRef(null);
  const _reg=useRef(false);
  const toastRef=useRef(null);
  const turnoRef=useRef(false); // siempre actualizado, sin stale closure

  // Tick para timers
  useEffect(()=>{ const t=setInterval(()=>setAhora(Date.now()),1000); return()=>clearInterval(t); },[]);

  // Sincronizar turnoRef con estado (evita stale closure en GPS interval)
  useEffect(()=>{ turnoRef.current = turno; },[turno]);

  // Auth init
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session) iniciarApp(session.user);
      else setAuthed(true);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(_reg.current) return;
      if(event==='SIGNED_IN'&&session) iniciarApp(session.user);
      if(event==='SIGNED_OUT'){ setAuthed(true); setDelivery(null); }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const toast=useCallback(msg=>{
    setToastMsg(msg);
    clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToastMsg(''),3000);
  },[]);

  const iniciarApp=async(user)=>{
    const {data:rows,error}=await sb.from('delivery').select('id,nombre,correo,celular,ciudad,activo,estatus,saldo_billetera,vehiculo').eq('perfil_id',user.id).limit(1);
    if(error||!rows?.length){setAuthed(true);setDelivery(null);return;}
    const del=rows[0];
    if(!del.activo){setAuthed(true);setDelivery(null);return;}
    setDelivery({...del,email:del.correo||user.email});
    setSaldo(parseFloat(del.saldo_billetera)||0);
    setAuthed(true);
    // Leer turno actual desde ubicaciones_delivery
    const {data:ubi}=await sb.from('ubicaciones_delivery').select('en_turno').eq('delivery_id',del.id).single();
    const turnoActual = ubi?.en_turno || false;
    setTurno(turnoActual);
    turnoRef.current = turnoActual;
    cargarDatos(del.id);
    iniciarGPS(del.id);
    suscribirRealtime(del.id);
    cargarConfigSistema();
    cargarNotificacionesGlobal(del.id, setNotifs);
  };

  const buildTiempos=p=>{
    const t={};
    if(p.hora_asignado)           t.ASIGNADO           =new Date(p.hora_asignado).getTime();
    if(p.hora_aceptado)           t.ACEPTADO           =new Date(p.hora_aceptado).getTime();
    if(p.hora_en_establecimiento) t.EN_ESTABLECIMIENTO  =new Date(p.hora_en_establecimiento).getTime();
    if(p.hora_en_camino)          t.PEDIDO_EN_CAMINO    =new Date(p.hora_en_camino).getTime();
    if(p.hora_llegada)            t.ENTREGANDO          =new Date(p.hora_llegada).getTime();
    if(p.hora_finalizado)         t.FINALIZADO          =new Date(p.hora_finalizado).getTime();
    return t;
  };

  const cargarDatos=async(delId)=>{
    const ACTIVOS=['ASIGNADO','ACEPTADO','EN_ESTABLECIMIENTO','PEDIDO_EN_CAMINO','ENTREGANDO'];
    const [rP,rH,rD,rM]=await Promise.all([
      sb.from('pedidos').select('*').eq('delivery_id',delId).in('estatus',ACTIVOS).order('hora_asignado',{ascending:false}),
      sb.from('pedidos').select('no_orden,estatus,nombre_comercio,ciudad_destino,ingreso_delivery,tarifa_envio,hora_finalizado,hora_asignado').eq('delivery_id',delId).eq('estatus','FINALIZADO').order('hora_finalizado',{ascending:false}).limit(100),
      sb.from('depositos_delivery').select('*').eq('delivery_id',delId).order('creado_at',{ascending:false}),
      sb.from('depositos_delivery').select('id,monto,estatus,notas_despacho,creado_at').eq('delivery_id',delId).eq('estatus','APROBADO').order('creado_at',{ascending:false}).limit(20),
    ]);
    if(rP.data) setPedidos(rP.data.map(p=>({...normalizarPedido(p),tsInicio:p.hora_aceptado?new Date(p.hora_aceptado).getTime():Date.now(),tiempos:buildTiempos(p)})));
    if(rH.data) setHistorial(rH.data);
    if(rD.data) setDepositos(rD.data);
    if(rM.data) setMovimientos(rM.data.map(d=>({...d,tipo:'RECARGA',nota:'Recarga aprobada',ts:d.creado_at})));
  };

  const iniciarGPS=delId=>{
    if(!navigator.geolocation){
      console.warn('[GPS] no disponible');
      return;
    }
    const opts={enableHighAccuracy:true,timeout:15000,maximumAge:10000};
    const optsRapido={enableHighAccuracy:false,timeout:8000,maximumAge:30000};
    const enviarUbi=async(pos)=>{
      const payload={
        delivery_id:delId,
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        precision_m:Math.round(pos.coords.accuracy||0),
        en_turno:turnoRef.current,
        updated_at:new Date().toISOString()
      };
      const {error}=await sb.from('ubicaciones_delivery').upsert(payload,{onConflict:'delivery_id'});
      if(error) console.error('[GPS] upsert error:',error.message);
      else console.log('[GPS] OK',payload.lat,payload.lng,'turno:',payload.en_turno);
    };
    const onErr=e=>{
      // Código 3 = timeout — normal en Android, watchPosition reintenta solo
      if(e.code === 3) console.log('[GPS] timeout (normal, reintentando...)');
      else console.error('[GPS] error:', e.code, e.message);
    };
    // Posición inmediata
    navigator.geolocation.getCurrentPosition(enviarUbi,onErr,opts);
    // watchPosition: dispara al moverse
    const watchId=navigator.geolocation.watchPosition(enviarUbi,onErr,opts);
    // Intervalo 20s de respaldo (watchPosition puede pausarse en background Android)
    // Usa opciones menos exigentes para evitar timeouts frecuentes
    const intervalId=setInterval(()=>{
      navigator.geolocation.getCurrentPosition(enviarUbi,e=>{
        // Timeout en intervalo es normal — no loguear como error
        if(e.code !== 3) console.warn('[GPS] intervalo error:', e.code, e.message);
      }, optsRapido);
    },20000);
    gpsRef.current={watchId,intervalId};
  };

  const suscribirRealtime=delId=>{
    if(rtRef.current)sb.removeChannel(rtRef.current);
    rtRef.current=sb.channel('del_'+delId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'asignaciones_pendientes',filter:'delivery_id=eq.'+delId},async p=>{
        if(p.new.estatus!=='ENVIADO')return;
        const {data:ped}=await sb.from('pedidos').select('*').eq('id',p.new.pedido_id).single();
        if(ped){const peNorm=normalizarPedido(ped,p.new.id);setPe(peNorm);notifLocal('🔔 Nuevo Pedido',(ped.nombre_comercio||'—')+' · '+(ped.ciudad_destino||''));iniciarAlarma();}
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pedidos',filter:'delivery_id=eq.'+delId},p=>{
        console.log('[RT] pedido UPDATE:', p.new?.estatus, p.new?.id);
        cargarDatos(delId);
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'delivery',filter:'id=eq.'+delId},p=>{ if(p.new.saldo_billetera!==undefined){ setSaldo(parseFloat(p.new.saldo_billetera)||0); sonarDepositoAprobado(); } })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'depositos_delivery',filter:'delivery_id=eq.'+delId},p=>{ cargarDatos(delId); if(p.new?.estatus==='APROBADO') sonarDepositoAprobado(); })
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_mensajes',filter:'delivery_id=eq.'+delId},p=>{
        if(p.new.remitente==='DESPACHO'){
          setChatUnread(n=>n+1);
          notifLocal('💬 Despacho',p.new.mensaje);
          sonarMensaje();
        }
      })
      .subscribe();
  };

  const avanzarReal=async(pid,est,facData=null)=>{
    const eb=ESIG[est];if(!eb)return;
    const ahora=new Date().toISOString();
    const campos={estatus:eb.sig};
    if(eb.sig==='ACEPTADO')           campos.hora_aceptado=ahora;
    if(eb.sig==='EN_ESTABLECIMIENTO') campos.hora_en_establecimiento=ahora;
    if(eb.sig==='PEDIDO_EN_CAMINO')   campos.hora_en_camino=ahora;
    if(eb.sig==='ENTREGANDO')         campos.hora_llegada=ahora;
    if(eb.sig==='FINALIZADO')         campos.hora_finalizado=ahora;
    if(facData?.facMonto)             campos.monto_pagado_en_comercio=facData.facMonto;
    if(facData?.facFile){
      const {data:{session}}=await sb.auth.getSession();
      const uid=session?.user?.id;
      const ext=facData.facFile.name.split('.').pop()?.toLowerCase()||'jpg';
      const {data:up}=await sb.storage.from('delivery-docs').upload(`${uid}/fac_${pid}_${Date.now()}.${ext}`,facData.facFile,{cacheControl:'3600',upsert:true,contentType:facData.facFile.type});
      if(up){const {data:u}=await sb.storage.from('delivery-docs').createSignedUrl(up.path,60*60*24*365*10);if(u?.signedUrl)campos.foto_factura_url=u.signedUrl;}
    }
    const {error}=await sb.from('pedidos').update(campos).eq('id',pid).eq('delivery_id',delivery.id);
    if(error){
      console.error('[avanzar] error:', error.message);
      // Fallback: intentar sin filtro delivery_id
      const {error:e2}=await sb.from('pedidos').update(campos).eq('id',pid);
      if(e2){toast('❌ '+e2.message);return;}
    }
    if(eb.sig==='FINALIZADO'){setDetalle(null);toast('✅ ¡Pedido finalizado!');sonarFinalizado();}
    else{toast('✅ Estado actualizado');sonarEstadoAvanzado();}
    cargarDatos(delivery.id);
  };

  const toggleTurno=async(val)=>{
    setTurno(val);
    turnoRef.current=val;
    if(val) setPausado(false); // al activar, quitar pausa
    const { error } = await sb.from('ubicaciones_delivery')
      .update({ en_turno:val, pausado:false, updated_at:new Date().toISOString() })
      .eq('delivery_id', delivery.id);
    if(error) {
      await sb.from('ubicaciones_delivery').insert({ delivery_id:delivery.id, en_turno:val, pausado:false, lat:0, lng:0, updated_at:new Date().toISOString() });
    }
    toast(val?'✅ Turno activado':'⏹ Turno desactivado');
  };

  const pausarTurno=async()=>{
    const nuevoPausado = !pausado;
    setPausado(nuevoPausado);
    await sb.from('ubicaciones_delivery')
      .update({ pausado:nuevoPausado, updated_at:new Date().toISOString() })
      .eq('delivery_id', delivery.id);
    toast(nuevoPausado?'⏸ Turno pausado — no recibirás pedidos':'▶️ Turno reanudado');
  };

  const aceptarPE=async()=>{
    if(!pe)return;
    detenerAlarma();
    const horaAceptado=new Date().toISOString();
    // 1. Marcar asignación como ACEPTADO primero (esto tiene política permisiva)
    if(pe._asigId){
      await sb.from('asignaciones_pendientes')
        .update({estatus:'ACEPTADO',respondido_at:horaAceptado})
        .eq('id',pe._asigId);
    }
    // 2. Actualizar pedido via RPC para evitar problemas de RLS
    const {error:updErr}=await sb.from('pedidos')
      .update({estatus:'ACEPTADO',hora_aceptado:horaAceptado,delivery_id:delivery.id})
      .eq('id',pe.id);
    if(updErr){
      console.error('[aceptar] error:', updErr.message);
      // Intentar via RPC como fallback
      const {error:rpcErr}=await sb.rpc('rider_aceptar_pedido',{
        p_pedido_id:pe.id,
        p_delivery_id:delivery.id,
        p_hora:horaAceptado
      });
      if(rpcErr){
        console.error('[aceptar] rpc error:', rpcErr.message);
        toast('⚠️ '+updErr.message);
        setPe(null);
        return;
      }
    }
    toast('✅ Pedido aceptado');
    setPe(null);
    setTimeout(()=>cargarDatos(delivery.id),300);
  };

  const rechazarPE=async()=>{
    detenerAlarma();
    if(pe?._asigId) await sb.from('asignaciones_pendientes')
      .update({estatus:'RECHAZADO',respondido_at:new Date().toISOString()})
      .eq('id',pe._asigId);
    if(pe?.id) await sb.from('pedidos')
      .update({estatus:'PENDIENTE',delivery_id:null})
      .eq('id',pe.id)
      .eq('delivery_id',delivery.id);
    setPe(null);toast('Pedido rechazado');
  };

  const cerrarSesion=async()=>{
    if(gpsRef.current){
      if(typeof gpsRef.current === 'object'){
        if(gpsRef.current.watchId!=null) navigator.geolocation.clearWatch(gpsRef.current.watchId);
        if(gpsRef.current.intervalId!=null) clearInterval(gpsRef.current.intervalId);
      } else { clearInterval(gpsRef.current); }
    }
    if(rtRef.current)sb.removeChannel(rtRef.current);
    if(delivery) { try { await sb.from('ubicaciones_delivery').update({en_turno:false,updated_at:new Date().toISOString()}).eq('delivery_id',delivery.id); } catch(e){} }
    await sb.auth.signOut();
    setDelivery(null);setPedidos([]);setHistorial([]);setDepositos([]);setMovimientos([]);setSaldo(0);setTurno(false);
  };

  // ── Loading ───────────────────────────────────────────
  if(!authed) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F0F0F',flexDirection:'column',gap:16}}>
      <div style={{fontSize:44,animation:'pulse 1.5s infinite'}}>🛵</div>
      <div style={{fontSize:13,color:'#888'}}>Cargando...</div>
    </div>
  );

  // ── Sin delivery activo (pendiente o sin registro) ────
  if(!delivery) return(
    <div style={{minHeight:'100vh',background:'#0F0F0F'}}>
      <AuthScreen onLogin={iniciarApp}/>
    </div>
  );

  const activos=pedidos.filter(p=>['ASIGNADO','ACEPTADO','EN_ESTABLECIMIENTO','PEDIDO_EN_CAMINO','ENTREGANDO'].includes(p.estatus||p.est));

  // ── Vista detalle del pedido ──────────────────────────
  if(detalle&&tab==='asignados') return(
    <div>
      <VistaPedido
        p={detalle} pedidos={pedidos}
        onAvanzar={avanzarReal}
        onBack={()=>setDetalle(null)}
        onConfirm={setSheet}
        toast={toast}
        ahora={ahora}
      />
      <BottomSheet data={sheet} onClose={()=>setSheet(null)}/>
      <Toast msg={toastMsg}/>
    </div>
  );

  const TABS=[
    {id:'asignados',icon:'🛵',lbl:'ASIGNADOS'},
    {id:'zona',icon:'🗺️',lbl:'ZONA'},
    {id:'guaca',icon:'💰',lbl:'GUACA'},
    {id:'chat',icon:'💬',lbl:'CHAT',badge:chatUnread},
    {id:'perfil',icon:'👤',lbl:'PERFIL'},
  ];

  return(
    <div>
      {/* Side menu */}
      {sideOpen&&(
        <div style={{position:'fixed',inset:0,zIndex:100}} onClick={()=>setSideOpen(false)}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)'}}/>
          <div onClick={e=>e.stopPropagation()} style={{position:'absolute',left:0,top:0,bottom:0,width:270,background:'#1A1A1A',borderRight:'1px solid #333',display:'flex',flexDirection:'column',animation:'slideUp .25s'}}>
            <div style={{padding:'20px 16px 16px',borderBottom:'1px solid #333',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:52,height:52,background:'#FF8C00',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,flexShrink:0}}>{delivery?.nombre?.charAt(0)||'?'}</div>
              <div><div style={{fontSize:15,fontWeight:700}}>{delivery?.nombre}</div><div style={{fontSize:12,color:'#888'}}>{delivery?.email}</div></div>
            </div>
            {[['📅 Mis Turnos','turnos'],['📋 Historial','historial'],['💳 Mis Depósitos','depositos']].map(([lbl,t])=>(
              <button key={t} onClick={()=>{setTab(t);setSideOpen(false);}} style={{display:'flex',alignItems:'center',gap:12,padding:'15px 16px',background:'none',border:'none',borderBottom:'1px solid #222',color:'#F0F0F0',width:'100%',textAlign:'left',fontSize:14,fontWeight:600}}>{lbl}</button>
            ))}
            <button onClick={()=>{setSheet({msg:'¿Cerrar sesión?',confirmLbl:'Sí, cerrar sesión',color:'#EF4444',onSi:cerrarSesion});setSideOpen(false);}} style={{display:'flex',alignItems:'center',gap:12,padding:'15px 16px',background:'none',border:'none',color:'#EF4444',width:'100%',textAlign:'left',fontSize:14,fontWeight:600,marginTop:'auto',borderTop:'1px solid #333'}}>🚪 Cerrar Sesión</button>
          </div>
        </div>
      )}

      {/* Pedido entrante */}
      {pe&&<PedidoEntrante pedido={pe} onAceptar={aceptarPE} onRechazar={rechazarPE}/>}

      {/* Header */}
      <div style={{background:'#1A1A1A',borderBottom:'1px solid #333',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:40}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setSideOpen(true)} style={{background:'none',border:'none',color:'#F0F0F0',fontSize:24,padding:4,lineHeight:1}}>☰</button>
          <img style={{width:34,height:34,borderRadius:9}} src="https://res.cloudinary.com/drkaxsziu/image/upload/v1767871213/Somar_Express_2048_x_2048_px_18_x_18_in__20250623_221102_0000_o0bv7a.png"/>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>{delivery?.nombre}</div>
            <div style={{fontSize:11,color:'#888'}}>{activos.length} pedido{activos.length!==1?'s':''} activo{activos.length!==1?'s':''}</div>
          </div>
        </div>
        <button onClick={()=>{
          if(!turno&&saldo<MIN_SALDO){toast('⛔ Saldo insuficiente. Recarga para trabajar.');return;}
          setSheet({msg:turno?'¿Pausar tu turno? Dejarás de recibir pedidos.':'¿Activar tu turno? Empezarás a recibir pedidos.',confirmLbl:turno?'Sí, pausar':'Sí, activar',color:turno?'#888':'#22C55E',onSi:()=>toggleTurno(!turno)});
        }} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:20,border:'1.5px solid '+(turno?'#22C55E':'#555'),background:turno?'rgba(34,197,94,.1)':'#2C2C2C',color:turno?'#22C55E':'#888',fontSize:12,fontWeight:700}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'currentColor',animation:turno?'pulse 1.5s infinite':'none'}}/>
          {turno ? (pausado ? '⏸ Pausado' : '● Disponible') : saldo<MIN_SALDO ? '⛔ Sin saldo' : 'Fuera de turno'}
        </button>
        {turno&&(
          <button onClick={pausarTurno} style={{marginLeft:6,background:pausado?'rgba(34,197,94,.2)':'rgba(245,158,11,.15)',border:`1px solid ${pausado?'#22C55E':'#F59E0B'}`,borderRadius:20,padding:'6px 10px',color:pausado?'#22C55E':'#F59E0B',fontSize:11,fontWeight:700,cursor:'pointer'}}>
            {pausado?'▶ Reanudar':'⏸ Pausar'}
          </button>
        )}
        <button onClick={()=>setShowNotifs(s=>!s)} style={{position:'relative',background:'none',border:'none',color:'#888',fontSize:20,padding:4,cursor:'pointer',marginLeft:4}}>
          🔔
          {notifs.filter(n=>!n.leida).length>0&&(
            <div style={{position:'absolute',top:0,right:0,width:16,height:16,background:'#EF4444',borderRadius:'50%',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {notifs.filter(n=>!n.leida).length}
            </div>
          )}
        </button>
      </div>

      {/* Panel notificaciones */}
      {showNotifs&&(
        <div style={{position:'fixed',inset:0,zIndex:150}} onClick={()=>setShowNotifs(false)}>
          <div onClick={e=>e.stopPropagation()} style={{position:'absolute',top:56,right:8,width:320,maxHeight:'70vh',background:'#1A1A1A',border:'1px solid #333',borderRadius:16,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,.6)',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'12px 14px',borderBottom:'1px solid #333',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:13,fontWeight:700}}>🔔 Notificaciones</div>
              <button onClick={async()=>{
                await sb.from('notificaciones_delivery').update({leida:true}).eq('delivery_id',delivery.id).eq('leida',false);
                setNotifs(n=>n.map(x=>({...x,leida:true})));
              }} style={{background:'none',border:'none',color:'#FF8C00',fontSize:11,fontWeight:700,cursor:'pointer'}}>Limpiar todas</button>
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              {notifs.length===0&&<div style={{padding:20,textAlign:'center',fontSize:12,color:'#555'}}>Sin notificaciones</div>}
              {notifs.map(n=>(
                <div key={n.id} style={{padding:'10px 14px',borderBottom:'1px solid #222',background:n.leida?'transparent':'rgba(255,140,0,.05)',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{fontSize:18,flexShrink:0}}>{n.icono||'🔔'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{n.titulo}</div>
                    {n.cuerpo&&<div style={{fontSize:11,color:'#888'}}>{n.cuerpo}</div>}
                    <div style={{fontSize:10,color:'#555',marginTop:3}}>{new Date(n.created_at).toLocaleString('es-HN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'})}</div>
                  </div>
                  {!n.leida&&<div style={{width:8,height:8,borderRadius:'50%',background:'#FF8C00',flexShrink:0,marginTop:4}}/>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Contenido */}
      <div style={{paddingBottom:80}}>
        {tab==='asignados'&&(
          activos.length===0
            ?<div style={{textAlign:'center',padding:'60px 24px'}}><div style={{fontSize:52,marginBottom:14}}>🛵</div><h3 style={{fontSize:18,fontWeight:800,marginBottom:8}}>Sin pedidos activos</h3><p style={{fontSize:14,color:'#888'}}>Activa tu turno para recibir pedidos</p></div>
            :<div>{activos.map(p=><CardResumen key={p.id} p={p} onTap={setDetalle}/>)}</div>
        )}
        {tab==='turnos'&&<TabTurnos delivery={delivery} toast={toast}/>}
        {tab==='historial'&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.07em',padding:'14px 14px 8px'}}>Historial de Pedidos</div>
            {historial.length===0&&<div style={{textAlign:'center',padding:'56px 24px'}}><div style={{fontSize:50,marginBottom:12}}>📋</div><h3>Sin entregas aún</h3></div>}
            {historial.map((p,i)=>{
              const ok=p.estatus==='FINALIZADO',color=ok?'#22C55E':p.estatus==='CANCELADO'?'#EF4444':'#F59E0B';
              const gan=parseFloat(p.ingreso_delivery||0);
              const fecha=p.hora_finalizado?new Date(p.hora_finalizado).toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
              return(<div key={i} style={{background:'#1A1A1A',borderRadius:13,padding:'13px 14px',margin:'0 12px 8px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',borderLeft:'4px solid '+color}}>
                <div><div style={{fontSize:13,fontWeight:800,fontFamily:'monospace'}}>{p.no_orden}</div><div style={{fontSize:12,color:'#888',marginTop:2}}>{p.nombre_comercio||'—'} → {p.ciudad_destino||'—'}</div><div style={{fontSize:11,color:'#888',marginTop:1}}>{fecha}</div></div>
                <div style={{textAlign:'right'}}><div style={{fontSize:17,fontWeight:900,color:ok?'#22C55E':'#888'}}>{ok?fmtL(gan):'—'}</div><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color,marginTop:3}}>{p.estatus}</div></div>
              </div>);
            })}
          </div>
        )}
        {tab==='guaca'&&<TabGuaca historial={historial} saldo={saldo} movimientos={movimientos} onIrDepositos={()=>setTab('depositos')} delivery={delivery}/>}
        {tab==='zona'&&<TabZona delivery={delivery}/>}
        {tab==='chat'&&<TabChat delivery={delivery}/>}
        {tab==='depositos'&&<TabDepositos delivery={delivery} depositos={depositos} setDepositos={setDepositos} onConfirm={setSheet} toast={toast}/>}
        {tab==='perfil'&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.07em',padding:'14px 14px 8px'}}>Mi Perfil</div>
            <div style={{margin:'0 12px 12px',background:'#1A1A1A',border:'1px solid #333',borderRadius:16,padding:16}}>
              <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
                <div style={{width:56,height:56,background:'#FF8C00',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:900,flexShrink:0}}>{delivery?.nombre?.charAt(0)||'?'}</div>
                <div><div style={{fontSize:17,fontWeight:700}}>{delivery?.nombre}</div><div style={{fontSize:13,color:'#888'}}>{delivery?.email}</div></div>
              </div>
              <div style={{background:'#232323',borderRadius:12,overflow:'hidden'}}>
                {[['Celular',delivery?.celular],['Ciudad',delivery?.ciudad],['Saldo',fmtL(saldo)]].map(([l,v])=>(
                  <div key={l} style={{padding:'12px 14px',borderBottom:'1px solid #2C2C2C',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,color:'#888'}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:l==='Saldo'?(saldo<MIN_SALDO?'#EF4444':saldo<MIN_SALDO*2?'#F59E0B':'#22C55E'):'inherit'}}>{v||'—'}</span></div>
                ))}
                <div style={{padding:'12px 14px',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,color:'#888'}}>Estado</span><span style={{fontSize:13,fontWeight:600,color:'#22C55E'}}>Activo ✅</span></div>
              </div>
            </div>
            <div style={{margin:'0 12px'}}><a href="https://wa.me/50499999999" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:14,background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.25)',borderRadius:14,color:'#25d366',fontWeight:700,fontSize:14}}>💬 WhatsApp Despacho</a></div>
          </div>
        )}
      </div>

      {/* Bottom tabs */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#1A1A1A',borderTop:'1px solid #333',display:'flex',padding:'6px 0 20px',zIndex:30}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id==='chat')setChatUnread(0);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:'none',border:'none',color:tab===t.id?'#FF8C00':'#555',padding:'5px 0',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',position:'relative'}}>
            <span style={{fontSize:22,lineHeight:1}}>{t.icon}</span>
            {t.lbl}
            {t.badge>0&&<div style={{position:'absolute',top:2,right:'calc(50% - 14px)',background:'#EF4444',color:'#fff',borderRadius:10,fontSize:9,fontWeight:800,padding:'1px 5px',minWidth:16,textAlign:'center'}}>{t.badge}</div>}
          </button>
        ))}
      </div>

      <BottomSheet data={sheet} onClose={()=>setSheet(null)}/>
      <Toast msg={toastMsg}/>
    </div>
  );
}



// ─── TAB TURNOS ──────────────────────────────────────────────
function TabTurnos({delivery, toast}){
  const [turnos,setTurnos]=useState([]);
  const [reservas,setReservas]=useState([]);
  const [cargando,setCargando]=useState(true);
  const manana = new Date(Date.now()+86400000).toISOString().split('T')[0];
  const [fecha,setFecha]=useState(manana);

  const cargar=async()=>{
    setCargando(true);
    const [{data:t},{data:r}] = await Promise.all([
      sb.from('turnos_config').select('*').eq('activo',true).order('hora_inicio'),
      sb.from('reservaciones_turno').select('*,turno:turno_id(nombre,hora_inicio,hora_fin,max_riders)')
        .eq('delivery_id',delivery.id).gte('fecha',new Date().toISOString().split('T')[0]).order('fecha')
    ]);
    setTurnos(t||[]);
    setReservas(r||[]);
    setCargando(false);
  };

  useEffect(()=>{ if(delivery?.id) cargar(); },[delivery?.id]);

  const reservar=async(turnoId)=>{
    // Verificar cupo disponible
    const {count} = await sb.from('reservaciones_turno')
      .select('*',{count:'exact',head:true})
      .eq('turno_id',turnoId).eq('fecha',fecha)
      .neq('estatus','CANCELADO');
    const turno = turnos.find(t=>t.id===turnoId);
    const max = turno?.max_riders || 2;
    if(count >= max){ toast('⚠️ Este turno ya está lleno para esa fecha'); return; }
    // Verificar si ya tiene ese turno específico ese día (no bloquear otros turnos)
    const yaTieneTurno = reservas.find(r=>r.turno_id===turnoId&&r.fecha===fecha&&r.estatus!=='CANCELADO');
    if(yaTieneTurno){ toast('⚠️ Ya tienes este turno reservado para esa fecha'); return; }
    const {error} = await sb.from('reservaciones_turno').insert({
      turno_id:turnoId, delivery_id:delivery.id, fecha, estatus:'RESERVADO'
    });
    if(error){ toast('Error: '+error.message); return; }
    toast('✅ Turno reservado correctamente');
    cargar();
  };

  const cancelar=async(id)=>{
    await sb.from('reservaciones_turno').update({estatus:'CANCELADO'}).eq('id',id);
    toast('Reservación cancelada');
    cargar();
  };

  const colores={RESERVADO:'#F59E0B',CONFIRMADO:'#22C55E',CANCELADO:'#EF4444',COMPLETADO:'#888'};

  return(
    <div style={{paddingBottom:80}}>
      {/* Encabezado */}
      <div style={{margin:'12px 12px 0',background:'rgba(255,140,0,.08)',border:'1px solid rgba(255,140,0,.2)',borderRadius:14,padding:'12px 14px'}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>📅 Reserva tu turno</div>
        <div style={{fontSize:11,color:'#888'}}>Reserva el día anterior antes de las 11pm</div>
      </div>

      {/* Selector fecha */}
      <div style={{margin:'10px 12px'}}>
        <label style={{fontSize:11,color:'#888',fontWeight:600,display:'block',marginBottom:6}}>Fecha a reservar</label>
        <input type="date" value={fecha} min={manana}
          onChange={e=>setFecha(e.target.value)}
          style={{width:'100%',background:'#1A1A1A',border:'1px solid #333',borderRadius:10,padding:'10px 14px',color:'#F0F0F0',fontSize:14}}/>
      </div>

      {/* Turnos disponibles */}
      <div style={{margin:'0 12px',fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Turnos disponibles</div>
      {cargando?<div style={{textAlign:'center',padding:20,color:'#888'}}>Cargando...</div>:
        turnos.map(t=>{
          const yaReservo = reservas.find(r=>r.turno_id===t.id&&r.fecha===fecha&&r.estatus!=='CANCELADO');
          return(
            <div key={t.id} style={{margin:'0 12px 8px',background:'#1A1A1A',border:`1px solid ${yaReservo?'#22C55E':'#333'}`,borderRadius:14,padding:'12px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:14,fontWeight:800}}>{t.nombre}</div>
                  <div style={{fontSize:12,color:'#888',marginTop:2}}>{t.hora_inicio?.slice(0,5)} – {t.hora_fin?.slice(0,5)}</div>
                  <div style={{fontSize:11,color:'#555',marginTop:1}}>Máx {t.max_riders} riders</div>
                </div>
                {yaReservo
                  ? <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,fontWeight:700,color:colores[yaReservo.estatus]||'#888',marginBottom:6}}>{yaReservo.estatus}</div>
                      {yaReservo.estatus==='RESERVADO'&&<button onClick={()=>cancelar(yaReservo.id)} style={{background:'none',border:'1px solid #EF4444',borderRadius:8,padding:'5px 10px',color:'#EF4444',fontSize:11,cursor:'pointer'}}>Cancelar</button>}
                    </div>
                  : <button onClick={()=>reservar(t.id)} style={{background:'#FF8C00',border:'none',borderRadius:10,padding:'10px 16px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Reservar</button>
                }
              </div>
            </div>
          );
        })
      }

      {/* Mis reservaciones futuras */}
      {reservas.filter(r=>r.estatus!=='CANCELADO').length>0&&(
        <div style={{margin:'16px 12px 0'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Mis próximos turnos</div>
          {reservas.filter(r=>r.estatus!=='CANCELADO').map(r=>(
            <div key={r.id} style={{background:'#1A1A1A',border:'1px solid #333',borderRadius:12,padding:'10px 14px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:12,fontWeight:700}}>{r.turno?.nombre||'—'}</div>
                <div style={{fontSize:11,color:'#888'}}>{r.fecha} · {r.turno?.hora_inicio?.slice(0,5)}–{r.turno?.hora_fin?.slice(0,5)}</div>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:colores[r.estatus]||'#888'}}>{r.estatus}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── TAB ZONA ─────────────────────────────────────────────
// Muestra mapa con zona de cobertura y posición del rider
// Círculo de 5km centrado en Choloma
function TabZona({delivery}){
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const routeLayerRef = React.useRef(null);
  const markersRef = React.useRef({});
  const [gpsPos, setGpsPos] = React.useState(null);
  const [dentroZona, setDentroZona] = React.useState(null);
  const [pedidoSel, setPedidoSel] = React.useState(null);
  const [rutaInfo, setRutaInfo] = React.useState(null);
  const [cargandoRuta, setCargandoRuta] = React.useState(false);
  const [pedidosActivos, setPedidosActivos] = React.useState([]);

  const radioKm = _configSistema.zona_radio_km || 2.5;
  const radioM  = radioKm * 1000;
  const ZONAS = [
    { nombre:'Choloma Centro', lat:15.609903, lng:-87.956312, radio:radioM, color:'#FF8C00' },
    { nombre:'San Pedro Sula', lat:15.500000, lng:-88.025100, radio:radioM, color:'#3B82F6' },
  ];

  const haversineKm = (lat1,lng1,lat2,lng2)=>{
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const parseGps = gps => {
    if(!gps) return null;
    const parts = gps.split(',');
    const lat = parseFloat(parts[0]?.trim());
    const lng = parseFloat(parts[1]?.trim());
    return (lat && lng) ? {lat, lng} : null;
  };

  // Obtener ruta OSRM por carretera real
  const obtenerRutaOSRM = async (puntos) => {
    // puntos = [{lat,lng}, {lat,lng}, ...]
    if(puntos.length < 2) return null;
    const coords = puntos.map(p => `${p.lng},${p.lat}`).join(';');
    const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=false`;
    try {
      const res = await fetch(url, {timeout:8000});
      const data = await res.json();
      if(data.code !== 'Ok' || !data.routes?.length) return null;
      const route = data.routes[0];
      return {
        coords: route.geometry.coordinates.map(c => [c[1], c[0]]), // [lat,lng]
        distancia_km: (route.distance / 1000).toFixed(1),
        tiempo_min: Math.round(route.duration / 60),
      };
    } catch(e) {
      // Fallback: línea recta
      console.warn('[OSRM] error, usando línea recta:', e.message);
      return { coords: puntos.map(p=>[p.lat,p.lng]), distancia_km: haversineKm(puntos[0].lat,puntos[0].lng,puntos[puntos.length-1].lat,puntos[puntos.length-1].lng).toFixed(1), tiempo_min: null };
    }
  };

  // Inicializar mapa
  useEffect(()=>{
    if(mapInstanceRef.current) return;
    const el = document.getElementById('mapa-zona-rider');
    if(!el) return;
    const map = window.L.map('mapa-zona-rider', {zoomControl:true}).setView([15.6133,-87.9480],13);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    ZONAS.forEach(z=>{
      window.L.circle([z.lat,z.lng],{radius:z.radio,color:z.color,fillColor:z.color,fillOpacity:0.06,weight:2,dashArray:'6,4'}).addTo(map);
    });
    mapInstanceRef.current = map;

    // GPS del rider - tiempo real con watchPosition
    if(navigator.geolocation){
      const iconRider = window.L.divIcon({html:`<div style="width:36px;height:36px;border-radius:50%;background:#FF8C00;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.5)">🛵</div>`,iconSize:[36,36],iconAnchor:[18,18],className:''});
      let primeraVez = true;
      const actualizarPosicion = pos => {
        const lat=pos.coords.latitude, lng=pos.coords.longitude;
        setGpsPos({lat,lng});
        const dentro = ZONAS.find(z=>haversineKm(lat,lng,z.lat,z.lng)<=radioKm);
        setDentroZona(dentro||null);
        if(!markersRef.current.rider){
          markersRef.current.rider = window.L.marker([lat,lng],{icon:iconRider}).addTo(map).bindPopup('📍 Tu posición');
        } else {
          markersRef.current.rider.setLatLng([lat,lng]);
        }
        if(primeraVez){ map.flyTo([lat,lng],14,{animate:true,duration:1}); primeraVez=false; }
      };
      navigator.geolocation.getCurrentPosition(actualizarPosicion,()=>{},{enableHighAccuracy:true,timeout:10000});
      // watchPosition para actualización en tiempo real
      const wId = navigator.geolocation.watchPosition(actualizarPosicion,e=>{
        if(e.code!==3) console.warn('[mapa-zona] GPS:',e.message);
      },{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
      markersRef.current._watchId = wId;
    }
  },[]);

  // Cargar pedidos activos del rider
  useEffect(()=>{
    if(!delivery?.id) return;
    const ACTIVOS=['ASIGNADO','ACEPTADO','EN_ESTABLECIMIENTO','PEDIDO_EN_CAMINO','ENTREGANDO'];
    sb.from('pedidos').select('id,no_orden,estatus,nombre_comercio,direccion_recogida,ubicacion_recogida_gps,direccion_entrega,ubicacion_entrega_gps,nombre_cliente,distancia_km')
      .eq('delivery_id',delivery.id).in('estatus',ACTIVOS)
      .then(({data})=>{
        if(data){
          setPedidosActivos(data);
          if(data.length===1) setPedidoSel(data[0]);
        }
      });
  },[delivery?.id]);

  // Dibujar ruta cuando cambia pedido seleccionado
  useEffect(()=>{
    if(!pedidoSel || !mapInstanceRef.current || !gpsPos) return;
    dibujarRuta(pedidoSel);
  },[pedidoSel, gpsPos]);

  const dibujarRuta = async (p) => {
    const map = mapInstanceRef.current;
    if(!map) return;
    setCargandoRuta(true);

    // Limpiar ruta anterior
    if(routeLayerRef.current){ map.removeLayer(routeLayerRef.current); routeLayerRef.current=null; }
    Object.keys(markersRef.current).forEach(k=>{ if(k!=='rider'&&markersRef.current[k]){map.removeLayer(markersRef.current[k]);delete markersRef.current[k];} });

    const gpsRec = parseGps(p.ubicacion_recogida_gps);
    const gpsEnt = parseGps(p.ubicacion_entrega_gps);

    const puntos = [gpsPos];
    if(gpsRec) puntos.push(gpsRec);
    if(gpsEnt) puntos.push(gpsEnt);

    if(puntos.length < 2){ setCargandoRuta(false); return; }

    // Obtener ruta real por carretera
    const ruta = await obtenerRutaOSRM(puntos);
    setCargandoRuta(false);

    if(ruta){
      // Dibujar ruta
      const layer = window.L.layerGroup();
      
      // Segmento 1: posición → recolecta (azul)
      if(gpsRec && ruta.coords.length > 1){
        window.L.polyline(ruta.coords.slice(0, Math.floor(ruta.coords.length/2)+1),
          {color:'#3B82F6',weight:4,opacity:0.8}).addTo(layer);
      }
      // Segmento 2: recolecta → entrega (naranja)
      if(gpsRec && gpsEnt){
        window.L.polyline(ruta.coords.slice(Math.floor(ruta.coords.length/2)),
          {color:'#FF8C00',weight:4,opacity:0.8}).addTo(layer);
      }

      layer.addTo(map);
      routeLayerRef.current = layer;

      setRutaInfo({
        distancia: ruta.distancia_km,
        tiempo: ruta.tiempo_min,
      });

      // Marcador recolecta
      if(gpsRec){
        const iconRec = window.L.divIcon({html:`<div style="background:#3B82F6;color:#fff;border-radius:8px;padding:3px 7px;font-size:10px;font-weight:800;white-space:nowrap;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)">🏪 ${p.nombre_comercio?.slice(0,12)||'Recolecta'}</div>`,iconSize:[null,null],iconAnchor:[0,20],className:''});
        markersRef.current.rec = window.L.marker([gpsRec.lat,gpsRec.lng],{icon:iconRec}).addTo(map).bindPopup(`<b>📍 Recolecta</b><br>${p.nombre_comercio||'—'}<br>${p.direccion_recogida||''}`);
      }
      // Marcador entrega
      if(gpsEnt){
        const iconEnt = window.L.divIcon({html:`<div style="background:#22C55E;color:#fff;border-radius:8px;padding:3px 7px;font-size:10px;font-weight:800;white-space:nowrap;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)">🎯 ${p.no_orden||p.id?.slice(-6)||'Entrega'}</div>`,iconSize:[null,null],iconAnchor:[0,20],className:''});
        markersRef.current.ent = window.L.marker([gpsEnt.lat,gpsEnt.lng],{icon:iconEnt}).addTo(map).bindPopup(`<b>🎯 Entrega</b><br>${p.nombre_cliente||'—'}<br>${p.direccion_entrega||''}`);
      }

      // Ajustar vista al bounding box de la ruta
      if(ruta.coords.length > 0){
        const bounds = window.L.latLngBounds(ruta.coords);
        map.fitBounds(bounds, {padding:[40,40]});
      }
    }
  };

  useEffect(()=>{
    if(mapInstanceRef.current) setTimeout(()=>mapInstanceRef.current.invalidateSize(),100);
  });

  const zonaStatus = dentroZona
    ? {color:'#22C55E',txt:`✅ Dentro de ${dentroZona.nombre}`,sub:`Radio ${radioKm}km`}
    : gpsPos
      ? {color:'#EF4444',txt:'⚠️ Fuera de zona de cobertura',sub:'Acércate a Choloma o SPS'}
      : {color:'#888',txt:'📍 Obteniendo ubicación...',sub:'GPS activo'};

  return(
    <div style={{paddingBottom:80}}>
      {/* Status zona */}
      <div style={{margin:'10px 12px',background:`${zonaStatus.color}18`,border:`1px solid ${zonaStatus.color}44`,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:zonaStatus.color}}>{zonaStatus.txt}</div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>{zonaStatus.sub}</div>
        </div>
        {rutaInfo&&(
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:14,fontWeight:900,color:'#FF8C00'}}>{rutaInfo.distancia} km</div>
            {rutaInfo.tiempo&&<div style={{fontSize:11,color:'#888'}}>~{rutaInfo.tiempo} min</div>}
          </div>
        )}
      </div>

      {/* Selector de pedido si hay más de uno */}
      {pedidosActivos.length > 1 && (
        <div style={{margin:'0 12px 8px',display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
          {pedidosActivos.map(p=>(
            <button key={p.id} onClick={()=>setPedidoSel(p)}
              style={{flexShrink:0,padding:'6px 12px',borderRadius:20,border:`1.5px solid ${pedidoSel?.id===p.id?'#FF8C00':'#333'}`,background:pedidoSel?.id===p.id?'rgba(255,140,0,.15)':'#1A1A1A',color:pedidoSel?.id===p.id?'#FF8C00':'#888',fontSize:11,fontWeight:700,cursor:'pointer'}}>
              {p.no_orden||p.id.slice(-6)}
            </button>
          ))}
        </div>
      )}

      {/* Info del pedido seleccionado */}
      {pedidoSel&&(
        <div style={{margin:'0 12px 8px',background:'#1A1A1A',border:'1px solid #333',borderRadius:12,padding:'10px 14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:800,color:'#FF8C00'}}>{pedidoSel.no_orden}</div>
            <div style={{fontSize:11,color:'#888'}}>{pedidoSel.estatus}</div>
          </div>
          <div style={{display:'flex',gap:10,fontSize:11,color:'#ccc'}}>
            <div>🏪 <span style={{color:'#fff'}}>{pedidoSel.nombre_comercio||'—'}</span></div>
            <div>→</div>
            <div>👤 <span style={{color:'#fff'}}>{pedidoSel.nombre_cliente||'—'}</span></div>
          </div>
          {cargandoRuta&&<div style={{fontSize:11,color:'#888',marginTop:6}}>⏳ Calculando ruta...</div>}
          {!cargandoRuta&&rutaInfo&&(
            <div style={{display:'flex',gap:12,marginTop:6}}>
              <div style={{fontSize:11}}><span style={{color:'#3B82F6'}}>━━</span> <span style={{color:'#888'}}>→ Recolecta</span></div>
              <div style={{fontSize:11}}><span style={{color:'#FF8C00'}}>━━</span> <span style={{color:'#888'}}>→ Entrega</span></div>
            </div>
          )}
          {!pedidoSel.ubicacion_recogida_gps&&!pedidoSel.ubicacion_entrega_gps&&(
            <div style={{fontSize:11,color:'#F59E0B',marginTop:6}}>⚠️ Sin coordenadas GPS en este pedido</div>
          )}
        </div>
      )}

      {pedidosActivos.length===0&&(
        <div style={{margin:'0 12px 8px',background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',borderRadius:12,padding:'10px 14px',fontSize:12,color:'#22C55E'}}>
          ✅ Sin pedidos activos — tu zona se muestra arriba
        </div>
      )}

      {/* Mapa */}
      <div id="mapa-zona-rider" style={{height:380,width:'100%'}}/>

      {/* Leyenda */}
      <div style={{margin:'10px 12px 0',fontSize:11,color:'#555',textAlign:'center'}}>
        💡 Mantente dentro del radio de {radioKm}km · Ruta real por carretera via OSRM
      </div>
    </div>
  );
}


function TabDepositos({delivery, depositos, setDepositos, onConfirm, toast}){
  const [monto,setMonto]=useState('');
  const [file,setFile]=useState(null);
  const [prev,setPrev]=useState(null);
  const [err,setErr]=useState('');
  const [enviando,setEnviando]=useState(false);

  const hFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const doSet=()=>{setFile(f);const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};
    onConfirm({msg:'¿Usar esta foto como comprobante?',confirmLbl:'Sí, usar esta foto',color:'#22C55E',onSi:doSet});
  };

  const enviar=async()=>{
    if(!monto||parseFloat(monto)<=0)return setErr('Ingresa el monto');
    if(!file)return setErr('Sube la foto del comprobante');
    setErr('');setEnviando(true);
    try{
      const {data:{session}}=await sb.auth.getSession();
      const uid=session?.user?.id;
      const ext=file.name.split('.').pop()?.toLowerCase()||'jpg';
      const path=uid+'/dep_'+Date.now()+'.'+ext;
      const {data:up,error:upErr}=await sb.storage.from('delivery-docs').upload(path,file,{cacheControl:'3600',upsert:true,contentType:file.type});
      if(upErr){setErr('Error al subir foto');setEnviando(false);return;}
      const {data:urlData}=await sb.storage.from('delivery-docs').createSignedUrl(up.path,60*60*24*365*10);
      const {data:dep,error:insErr}=await sb.from('depositos_delivery').insert({delivery_id:delivery.id,monto:parseFloat(monto),foto_url:urlData?.signedUrl,estatus:'PENDIENTE'}).select().single();
      if(insErr){setErr('Error: '+insErr.message);setEnviando(false);return;}
      setDepositos(ds=>[dep,...ds]);
      setMonto('');setFile(null);setPrev(null);
      toast('✅ Depósito enviado — Despacho lo revisará');
    }finally{setEnviando(false);}
  };

  const cc={PENDIENTE:['#F59E0B','rgba(245,158,11,.15)'],APROBADO:['#22C55E','rgba(34,197,94,.15)'],RECHAZADO:['#EF4444','rgba(239,68,68,.15)']};

  return(
    <div>
      <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.07em',padding:'14px 14px 8px'}}>Recargar Billetera</div>
      <div style={{margin:'0 12px 12px',background:'#1A1A1A',border:'1px solid #333',borderRadius:16,padding:16}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>💳 Registrar Depósito</div>
        <div style={{fontSize:12,color:'#888',marginBottom:14}}>Sube el comprobante — Despacho aprobará tu recarga</div>
        <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Monto depositado (L.)</label>
        <input type="number" inputMode="decimal" placeholder="0.00" value={monto} onChange={e=>setMonto(e.target.value)}
          style={{width:'100%',background:'#232323',border:'1.5px solid #444',borderRadius:12,padding:'15px 14px',color:'#F0F0F0',fontSize:20,fontWeight:800,outline:'none',marginBottom:14}}/>
        <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Foto del comprobante</label>
        <div onClick={()=>document.getElementById('depInp').click()}
          style={{background:'#232323',border:'2px '+(prev?'solid #22C55E':'dashed #444'),borderRadius:14,padding:prev?0:20,textAlign:'center',overflow:'hidden',marginBottom:14}}>
          {prev
            ?<img src={prev} style={{width:'100%',maxHeight:140,objectFit:'cover',display:'block'}}/>
            :<><div style={{fontSize:32,marginBottom:6}}>📷</div><div style={{fontSize:14,fontWeight:700}}>Tomar foto del comprobante</div><div style={{fontSize:12,color:'#888',marginTop:4}}>Toca aquí</div></>
          }
        </div>
        <input type="file" id="depInp" accept="image/*" capture="environment" style={{display:'none'}} onChange={hFile}/>
        {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={enviar} disabled={enviando}
          style={{width:'100%',padding:16,borderRadius:14,background:enviando?'#333':'#FF8C00',color:enviando?'#888':'#fff',fontSize:16,fontWeight:800}}>
          {enviando?'Enviando...':'Enviar Depósito'}
        </button>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.07em',padding:'8px 14px'}}>Historial</div>
      {depositos.length===0&&<div style={{textAlign:'center',padding:'30px',color:'#888'}}>Sin depósitos aún</div>}
      {depositos.map(d=>{
        const [c,bg]=cc[d.estatus||d.est]||['#888','rgba(136,136,136,.15)'];
        const fecha=new Date(d.creado_at||d.ts||Date.now()).toLocaleDateString('es-HN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'});
        return(
          <div key={d.id} style={{background:'#1A1A1A',borderRadius:13,padding:'13px 14px',margin:'0 12px 8px',borderLeft:'4px solid '+c}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{fontSize:20,fontWeight:900}}>L. {parseFloat(d.monto).toFixed(2)}</div>
              <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',padding:'3px 9px',borderRadius:20,background:bg,color:c}}>{d.estatus||d.est}</span>
            </div>
            <div style={{fontSize:11,color:'#888',marginTop:4}}>{fecha}</div>
            {(d.notas_despacho||d.nota)&&<div style={{fontSize:12,color:'#888',marginTop:6,fontStyle:'italic'}}>{d.notas_despacho||d.nota}</div>}
            {(d.estatus||d.est)==='PENDIENTE'&&<div style={{fontSize:11,color:'#F59E0B',marginTop:6,fontWeight:600}}>⏳ En revisión — saldo se acredita al aprobar</div>}
          </div>
        );
      })}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
