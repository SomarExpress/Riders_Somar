(function(){
  try{
    var KEY="somar_modo_sol", KEY_OV="somar_sol_override";
    var ov=null;
    try{ ov=JSON.parse(localStorage.getItem(KEY_OV)||"null"); }catch(e){}
    var ahora=Date.now(), modo;
    if(ov && ov.hasta && ov.hasta>ahora){
      modo=ov.valor; // override manual aún vigente
    } else {
      var h=new Date().getHours();
      modo=(h>=6 && h<18) ? "1" : "0"; // 6:00–17:59 = sol
      try{ localStorage.removeItem(KEY_OV); }catch(e){}
    }
    try{ localStorage.setItem(KEY, modo); }catch(e){}
    if(modo==="1") document.documentElement.dataset.sol="1";
    // theme-color del status bar
    var mc=document.querySelector('meta[name="theme-color"]');
    if(mc) mc.setAttribute("content", modo==="1" ? "#FFFFFF" : "#0A0A0A");
  }catch(e){}
})();
/* Helper global expuesto para toggle desde el Perfil */
window.toggleModoSol=function(){
  try{
    var ahora=document.body.classList.contains("modo-sol");
    var nuevo=ahora?"0":"1";
    document.body.classList.toggle("modo-sol", !ahora);
    document.documentElement.dataset.sol=nuevo;
    localStorage.setItem("somar_modo_sol", nuevo);
    // Override manual válido 12h: respeta la elección del rider
    localStorage.setItem("somar_sol_override", JSON.stringify({
      valor:nuevo, hasta:Date.now()+12*60*60*1000
    }));
    var mc=document.querySelector('meta[name="theme-color"]');
    if(mc) mc.setAttribute("content", nuevo==="1" ? "#FFFFFF" : "#0A0A0A");
  }catch(e){ console.warn("[modo-sol]",e); }
};

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ════════════════════════════════════════════════════════════
// AUDIO + VIBRACIÓN — Delivery (Android PWA)
// ════════════════════════════════════════════════════════════
const _AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
let _audioOk = false;

function _getCtx() {
  if(!_actx && _AudioCtx) { try { _actx = new _AudioCtx(); } catch(e){} }
  if(_actx && _actx.state === 'suspended') { try { _actx.resume(); } catch(e){} }
  return _actx;
}

// Desbloquear en cualquier interacción del usuario
function _desbloquear() {
  if(_audioOk) return;
  try {
    const ctx = _getCtx();
    if(ctx) {
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      _audioOk = true;
    }
  } catch(e) {}
}
['click','touchstart','touchend','keydown','pointerdown'].forEach(ev =>
  document.addEventListener(ev, _desbloquear, {passive:true})
);

function _beep(freq=880, dur=0.15, vol=0.6, type='sine') {
  try {
    const ctx = _getCtx();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) { console.warn('[audio]', e.message); }
}

function _vibrar(p) {
  try { if('vibrate' in navigator) navigator.vibrate(p); } catch(e) {}
}

// ── Alarma pedido entrante (se repite hasta que se acepta/rechaza) ──────────
let _alarmInt = null;
function iniciarAlarma() {
  _detenerAlarma();
  _desbloquear();
  const tocar = () => {
    _beep(880, 0.1, 0.8, 'square');
    setTimeout(() => _beep(1100, 0.1, 0.8, 'square'), 140);
    setTimeout(() => _beep(880,  0.1, 0.8, 'square'), 280);
    setTimeout(() => _beep(1100, 0.15,0.8, 'square'), 420);
    _vibrar([300, 100, 300, 100, 300, 100, 300]);
  };
  tocar();
  _alarmInt = setInterval(tocar, 1400);
}
function _detenerAlarma() {
  if(_alarmInt) { clearInterval(_alarmInt); _alarmInt = null; }
  _vibrar([0]);
}
function detenerAlarma() { _detenerAlarma(); }

// ─── PEDIDO ENTRANTE ───────────────────────────────────────
// ACEPTAR: zona grande izquierda | RECHAZAR: franja pequeña derecha
function PedidoEntrante({pedido, onAceptar, onRechazar}){
  const [seg, setSeg] = useState(30);
  const [procesando, setProcesando] = useState(false);
  const tmr = useRef(null);
  const fired = useRef(false);
  const CIRC = 150.8;

  const [distReal, setDistReal] = useState(parseFloat(pedido?.km || pedido?.distancia_km || 0));

  useEffect(()=>{
    // Calcular distancia real rider→recolecta en tiempo real
    const gpsRec = pedido.ubicacion_recogida_gps || pedido.co;
    if(gpsRec && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        const latR = parseFloat(gpsRec.split(',')[0]);
        const lngR = parseFloat(gpsRec.split(',')[1]);
        if(latR && lngR){
          const R=6371, lat1=pos.coords.latitude*Math.PI/180, lat2=latR*Math.PI/180;
          const dLat=(latR-pos.coords.latitude)*Math.PI/180;
          const dLng=(lngR-pos.coords.longitude)*Math.PI/180;
          const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
          const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
          setDistReal(d);
        }
      },()=>{},{enableHighAccuracy:true,timeout:5000,maximumAge:30000});
    }
  },[pedido?.id]);

  useEffect(()=>{
    setSeg(30);
    fired.current = false;
    setProcesando(false);
    tmr.current = setInterval(()=>{
      setSeg(s=>{
        if(s<=1){
          clearInterval(tmr.current);
          if(!fired.current){ fired.current=true; onRechazar(); }
          return 0;
        }
        return s-1;
      });
    },1000);
    return ()=>{ clearInterval(tmr.current); };
  },[pedido?.id]);

  if(!pedido) return null;
  const pct = Math.max(0, seg/30);
  const offset = CIRC - pct * CIRC;
  // Valores seguros — nunca undefined
  const com    = pedido.com    || pedido.nombre_comercio  || '—';
  const ciudad = pedido.ciudad || pedido.ciudad_destino   || '—';
  const km = parseFloat(pedido.km || pedido.distancia_km || 0);
  const gan    = parseFloat(pedido.gan || pedido.ingreso_delivery || 0);
  const pago   = pedido.pago   || pedido.metodo_pago      || 'EFECTIVO';
  const tipo   = pedido.tipo   || 'DELIVERY';

  const handleAceptar = () => {
    if(procesando) return;
    setProcesando(true);
    clearInterval(tmr.current);
    fired.current = true;
    onAceptar();
  };
  const handleRechazar = () => {
    if(procesando) return;
    setProcesando(true);
    clearInterval(tmr.current);
    fired.current = true;
    onRechazar();
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:180,display:'flex',flexDirection:'column',background:'#080808'}}>
      {/* Info arriba — siempre dark, independiente del modo sol/luna */}
      <div style={{background:'linear-gradient(180deg,#111111 0%,#0A0A0A 100%)',flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'24px 20px',gap:16,overflowY:'auto'}}>
        {/* Encabezado + countdown */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1,paddingRight:12}}>
            <div style={{fontSize:11,color:'#FF8C00',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>🔔 Nuevo Pedido</div>
            <div style={{fontSize:26,fontWeight:900,lineHeight:1.15,color:'#FFFFFF'}}>{com}</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.6)',marginTop:5}}>{tipo==='DELIVERY'?'📦 Delivery':'🛒 Compra'}</div>
          </div>
          {/* Countdown */}
          <div style={{position:'relative',width:68,height:68,flexShrink:0}}>
            <svg width="68" height="68" viewBox="0 0 68 68" style={{transform:'rotate(-90deg)'}}>
              <circle fill="none" stroke="#2A2A2A" strokeWidth="6" cx="34" cy="34" r="27"/>
              <circle fill="none" stroke={pct>0.3?'#FF8C00':'#EF4444'} strokeWidth="6" strokeLinecap="round"
                strokeDasharray={CIRC} strokeDashoffset={offset}
                cx="34" cy="34" r="27" style={{transition:'stroke-dashoffset .95s linear, stroke .3s'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:pct>0.3?'#FF8C00':'#EF4444'}}>{seg}</div>
          </div>
        </div>
        {/* Info rápida — cards con colores explícitos */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[
            ['📍 Destino',    ciudad],
            ['📏 Distancia',  distReal > 0 ? `${distReal.toFixed(1)} km` : 'calculando…'],
            ['💳 Pago',       pago==='EFECTIVO'?'💵 Efectivo':'📲 Transferencia'],
            ['💰 Ganancia',   fmtL(gan)],
          ].map(([l,v])=>(
            <div key={l} style={{background:'#1E1E1E',borderRadius:12,padding:'10px 12px',border:'1px solid #2A2A2A'}}>
              <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4}}>{l}</div>
              <div style={{fontSize:14,fontWeight:800,color:'#F0F0F0'}}>{v}</div>
            </div>
          ))}
        </div>
        {procesando && <div style={{textAlign:'center',fontSize:13,color:'#888',marginTop:8}}>Procesando...</div>}
      </div>

      {/* BOTONES */}
      <div style={{display:'flex',height:110,background:'#0F0F0F',flexShrink:0}}>
        {/* ACEPTAR */}
        <button
          onClick={handleAceptar}
          disabled={procesando}
          style={{flex:3,background:procesando?'#1a4a1a':'#22C55E',color:'#fff',fontSize:22,fontWeight:900,
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            borderRight:'2px solid #0F0F0F',border:'none',cursor:procesando?'default':'pointer',
            WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
          <span style={{fontSize:32}}>✓</span> ACEPTAR
        </button>
        {/* RECHAZAR */}
        <button
          onClick={handleRechazar}
          disabled={procesando}
          style={{flex:1,background:'#1A1A1A',color:procesando?'#444':'#EF4444',fontSize:13,fontWeight:700,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,
            border:'none',cursor:procesando?'default':'pointer',
            WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
          <span style={{fontSize:24}}>✕</span>
          Rechazar
        </button>
      </div>
    </div>
  );
}

// ─── TIMER HELPERS ──────────────────────────────────────────
function fmtDur(ms){
  if(ms<0)ms=0;
  const m=Math.floor(ms/60000);
  const h=Math.floor(m/60), rm=m%60;
  if(h>0) return `${h}h ${rm}m`;
  if(m>0) return `${m}m`;
  return '<1m';
}

const ESTADO_ORDER = ['ACEPTADO','EN_ESTABLECIMIENTO','PEDIDO_EN_CAMINO','ENTREGANDO','FINALIZADO'];
const ESTADO_LABEL_CORTO = {
  ACEPTADO:'Aceptado', EN_ESTABLECIMIENTO:'En Estab.', 
  PEDIDO_EN_CAMINO:'En Camino', ENTREGANDO:'Entregando', FINALIZADO:'Finalizado'
};

function TimerPedido({p, ahora}){
  const tiempos = p.tiempos || {};
  const tsInicio = p.tsInicio || ahora;
  const totalMs = ahora - tsInicio;

  // Calcular duración de cada estado completado
  const estados = ESTADO_ORDER.filter(e => tiempos[e]);
  const duraciones = estados.map((est, i) => {
    const inicio = tiempos[est];
    const siguiente = estados[i+1] ? tiempos[estados[i+1]] : (p.est===est ? ahora : null);
    return { est, dur: siguiente ? siguiente - inicio : ahora - inicio, activo: p.est===est };
  });

  return(
    <div style={{padding:'10px 14px',borderTop:'1px solid #222',background:'rgba(255,255,255,.02)'}}>
      {/* Tiempo total */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:11,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>⏱ Tiempo Total</span>
        <span style={{fontSize:15,fontWeight:900,fontFamily:'monospace',color:'#FF8C00'}}>{fmtDur(totalMs)}</span>
      </div>
      {/* Por estado */}
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {duraciones.map(({est,dur,activo})=>(
          <div key={est} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {activo && <div style={{width:6,height:6,borderRadius:'50%',background:'#FF8C00',animation:'pulse 1.5s infinite'}}/>}
              {!activo && <div style={{width:6,height:6,borderRadius:'50%',background:'#444'}}/>}
              <span style={{fontSize:11,color:activo?'#F0F0F0':'#666',fontWeight:activo?700:400}}>{ESTADO_LABEL_CORTO[est]}</span>
            </div>
            <span style={{fontSize:11,fontFamily:'monospace',color:activo?'#FF8C00':'#555',fontWeight:activo?800:400}}>{fmtDur(dur)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

                    : null

                    <span style={{fontSize:13}}>{it.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,fontWeight:600,color:'var(--txt2)',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.label}</div>
                      <div style={{fontSize:9,color:it.url?'var(--green)':(it.critico?'var(--amber)':'var(--txt3)'),fontWeight:600,marginTop:1}}>
                        {it.url?'✓ Disponible':(it.critico?'⚠ Falta':'— Sin cargar')}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 14px 12px',background:'var(--s2)',borderTop:'1px solid var(--brd)',fontSize:10,color:'var(--txt3)',textAlign:'center',lineHeight:1.4}}>
              💡 Toca un documento para verlo en pantalla completa
            </div>
          </>
        )}
      </div>
    </>
  );
}

// ─── ☀️🌙 MODO SOL TOGGLE ────────────────────────────────────
function ModoSolToggle(){
  const [on, setOn] = useState(()=>typeof document!=='undefined' && document.body.classList.contains('modo-sol'));
  const [auto, setAuto] = useState(()=>{
    try{ return !localStorage.getItem('somar_sol_override'); }catch(e){ return true; }
  });
  const toggle = ()=>{
    if(window.toggleModoSol) window.toggleModoSol();
    setOn(document.body.classList.contains('modo-sol'));
    setAuto(false);
  };
  const restaurarAuto = ()=>{
    try{
      localStorage.removeItem('somar_sol_override');
      const h = new Date().getHours();
      const nuevo = (h>=6 && h<18) ? '1' : '0';
      const debe = nuevo==='1';
      document.body.classList.toggle('modo-sol', debe);
      document.documentElement.dataset.sol = nuevo;
      localStorage.setItem('somar_modo_sol', nuevo);
      const mc=document.querySelector('meta[name="theme-color"]');
      if(mc) mc.setAttribute('content', debe?'#FFFFFF':'#0A0A0A');
      setOn(debe);
      setAuto(true);
    }catch(e){}
  };
  return (
    <div style={{margin:'0 12px 12px',background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:14,padding:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--txt)'}}>{on?'☀️ Modo Sol':'🌙 Modo Luna'}</div>
          <div style={{fontSize:11,color:'var(--txt3)',marginTop:2}}>
            {on?'Tema claro para luz directa':'Tema oscuro para visibilidad nocturna'}
          </div>
        </div>
        <div onClick={toggle}
             style={{width:52,height:30,borderRadius:15,background:on?'var(--brand)':'var(--s4)',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
          <div style={{width:24,height:24,borderRadius:12,background:'#fff',position:'absolute',top:3,left:on?25:3,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.3)'}}/>
        </div>
      </div>
      {!auto && (
        <div onClick={restaurarAuto}
             style={{marginTop:10,padding:'8px 12px',background:'var(--s2)',border:'1px solid var(--brd)',borderRadius:10,fontSize:11,color:'var(--txt3)',textAlign:'center',cursor:'pointer'}}>
          🔄 Restaurar automático por hora del día
        </div>
      )}
      {auto && (
        <div style={{marginTop:10,fontSize:10,color:'var(--txt3)',textAlign:'center',opacity:.7}}>
          Automático · 6:00 AM – 6:00 PM = Sol
        </div>
      )}
    </div>
  );
}

// ─── VISTA DETALLE DEL PEDIDO ─────────────────────────────
// El botón de acción principal es un FAB sticky en la esquina inferior izquierda
function VistaPedido({p, pedidos, onAvanzar, onBack, onConfirm, toast, ahora}){
  const [facMonto, setFacMonto] = useState('');
  const [facFile, setFacFile] = useState(null);
  const [facPrev, setFacPrev] = useState(null);
  const [showFacSheet, setShowFacSheet] = useState(false);

  // El pedido puede cambiar de estado sin salir de la vista
  const pedidoActual = pedidos.find(x=>x.id===p.id) || p;
  const eb = ESIG[pedidoActual.est];
  const ec = ECHIP[pedidoActual.est]||'#888';

  const wo = pedidoActual.co ? `https://waze.com/ul?ll=${pedidoActual.co}&navigate=yes` : '';
  const mo = `https://maps.google.com/?q=${pedidoActual.co||encodeURIComponent(pedidoActual.dr)}`;
  const wd = pedidoActual.cd ? `https://waze.com/ul?ll=${pedidoActual.cd}&navigate=yes` : '';
  const md = `https://maps.google.com/?q=${pedidoActual.cd||encodeURIComponent(pedidoActual.de)}`;
  const cambio = pedidoActual.cp > 0 ? (pedidoActual.cp - pedidoActual.mc).toFixed(2) : null;

  const handleFileSelect = e => {
    const f = e.target.files[0]; if(!f) return;
    const doSet = () => { setFacFile(f); const r=new FileReader(); r.onload=ev=>setFacPrev(ev.target.result); r.readAsDataURL(f); };
    onConfirm({ msg:'¿Usar esta foto como factura?', confirmLbl:'Sí, usar esta foto', color:'#22C55E', onSi: doSet });
  };

  const handleAvanzar = () => {
    if(eb?.liq){
      if(!facMonto || parseFloat(facMonto)<=0) return toast('⚠️ Ingresa el monto pagado al establecimiento');
      if(!facFile) return toast('⚠️ Sube la foto de la factura');
    }
    const labels = {ACEPTADO:'llegué al establecimiento',EN_ESTABLECIMIENTO:'salir en camino',PEDIDO_EN_CAMINO:'llegué donde el cliente',ENTREGANDO:'finalizar esta entrega'};
    onConfirm({
      msg: `¿Confirmar que ${labels[pedidoActual.est]}?`,
      confirmLbl: eb.lbl,
      color: eb.color,
      onSi: () => onAvanzar(pedidoActual.id, pedidoActual.est, eb?.liq ? { facMonto, facFile } : null),
    });
  };

  const enRuta = pedidoActual.est === 'PEDIDO_EN_CAMINO' || pedidoActual.est === 'ENTREGANDO';
  const enEstablecimiento = pedidoActual.est === 'ACEPTADO' || pedidoActual.est === 'EN_ESTABLECIMIENTO';

    <div style={{minHeight:'100vh',background:'#0F0F0F',display:'flex',flexDirection:'column'}}>

        <button onClick={onBack} style={{background:'#2C2C2C',borderRadius:12,width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,color:'#F0F0F0',flexShrink:0}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:800,fontFamily:'monospace'}}>{pedidoActual.no}</div>
          <div style={{fontSize:12,color:'#888',marginTop:1}}>{pedidoActual.com} · {pedidoActual.tipo==='DELIVERY'?'📦':'🛒'} {pedidoActual.pago==='EFECTIVO'?'💵':'📲'}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <Chip est={pedidoActual.est}/>
          <div style={{fontSize:16,fontWeight:900,color:'#22C55E',marginTop:3}}>{fmtL(pedidoActual.gan)}</div>
        </div>
      </div>

      {/* MAPA RÁPIDO — STICKY bajo el header (zona frecuente en ruta) */}

      {/* CONTENIDO SCROLLABLE */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:120}}>

        {/* Botones de navegación — dentro del scroll, primeros elementos visibles */}
        {enEstablecimiento && (
          <div style={{background:'#161616',borderBottom:'1px solid #222',padding:'10px 12px'}}>
            <div style={{fontSize:10,color:'#888',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>📍 IR AL ESTABLECIMIENTO</div>
            <div style={{display:'flex',gap:8}}>
              {wo && <a href={wo} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(51,204,255,.08)',border:'1px solid rgba(51,204,255,.25)',color:'#33ccff',fontSize:14,fontWeight:700}}>🔵 Waze</a>}
              <a href={mo} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(66,133,244,.08)',border:'1px solid rgba(66,133,244,.25)',color:'#4285f4',fontSize:14,fontWeight:700}}>📍 Maps</a>
            </div>
          </div>
        )}
        {enRuta && (
          <div style={{background:'#161616',borderBottom:'1px solid #222',padding:'10px 12px'}}>
            <div style={{fontSize:10,color:'#888',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>📍 IR DONDE EL CLIENTE</div>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {wd && <a href={wd} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(51,204,255,.08)',border:'1px solid rgba(51,204,255,.25)',color:'#33ccff',fontSize:14,fontWeight:700}}>🔵 Waze</a>}
              <a href={md} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(66,133,244,.08)',border:'1px solid rgba(66,133,244,.25)',color:'#4285f4',fontSize:14,fontWeight:700}}>📍 Maps</a>
            </div>
            {(()=>{ const telDest = pedidoActual.telefono_destinatario || pedidoActual.celular_cliente || pedidoActual.telefono_cliente || pedidoActual.tel || ''; const telWA = telDest.replace(/[^0-9]/g,''); return telDest ? (
            <div style={{display:'flex',gap:8}}>
              <a href={`tel:${telDest}`} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',color:'#22C55E',fontSize:14,fontWeight:700}}>📞 Llamar</a>
              <a href={`https://wa.me/504${telWA}`} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px 0',borderRadius:12,background:'rgba(37,211,102,.08)',border:'1px solid rgba(37,211,102,.25)',color:'#25d366',fontSize:14,fontWeight:700}}>💬 WhatsApp</a>
            </div>) : null; })()}

        )}

        {/* Sección GENERALES */}
        <div style={{padding:'14px 14px 10px',borderBottom:'1px solid #222'}}>
          <div style={{fontSize:10,fontWeight:700,color:ec,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>📦 Generales</div>

        {/* Sección RECOLECTA */}

            <div style={{fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>🧾 Factura Enviada</div>
            <div style={{background:pedidoActual.factura_aprobada?'rgba(34,197,94,.08)':'rgba(245,158,11,.08)',border:`1px solid ${pedidoActual.factura_aprobada?'rgba(34,197,94,.25)':'rgba(245,158,11,.25)'}`,borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
              <img src={pedidoActual.foto_factura_url} style={{width:52,height:52,borderRadius:8,objectFit:'cover',flexShrink:0,cursor:'pointer'}} onClick={()=>window.open(pedidoActual.foto_factura_url,'_blank')}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:pedidoActual.factura_aprobada?'#22C55E':'#F59E0B'}}>
                  {pedidoActual.factura_aprobada ? '✅ Factura aprobada' : '⏳ En revisión por Despacho'}
                </div>
                <div style={{fontSize:12,color:'#888',marginTop:2}}>L. {parseFloat(pedidoActual.monto_pagado_en_comercio||pedidoActual.me||0).toFixed(2)} pagado</div>
              </div>
            </div>
          </div>
        )}

        {/* Sección ENTREGA */}
        {enRuta && (
          <div style={{padding:'14px',borderBottom:'1px solid #222'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#22C55E',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>📍 Punto de Entrega</div>
            {(pedidoActual.nombre_destinatario||pedidoActual.nombre_cliente)&&(
              <div style={{fontSize:15,fontWeight:800,marginBottom:2}}>{pedidoActual.nombre_destinatario||pedidoActual.nombre_cliente}</div>
            )}
            {(pedidoActual.telefono_destinatario||pedidoActual.celular_cliente)&&(
              <div style={{fontSize:12,color:'#888',marginBottom:4}}>📞 {pedidoActual.telefono_destinatario||pedidoActual.celular_cliente}</div>
            )}
            <div style={{fontSize:13,color:'#888',marginBottom:12}}>{pedidoActual.de||pedidoActual.direccion_entrega||'—'}</div>
            {pedidoActual.mc > 0 && (
              <div style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',borderRadius:14,padding:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:pedidoActual.cp>0?8:0}}>
                  <span style={{fontSize:13,color:'#888'}}>Total a cobrar</span>
                  <span style={{fontSize:24,fontWeight:900,color:'#22C55E'}}>L. {pedidoActual.mc.toFixed(2)}</span>
                </div>
                {pedidoActual.cp > 0 && (
                  <div style={{borderTop:'1px solid rgba(34,197,94,.2)',paddingTop:8,display:'flex',justifyContent:'space-between'}}>
                    <div><div style={{fontSize:11,color:'#888'}}>Paga con: L.{pedidoActual.cp.toFixed(2)}</div></div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'#888'}}>Cambio:</div>
                      <div style={{fontSize:18,fontWeight:900,color:'#22C55E'}}>L. {cambio}</div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {/* TIMER */}
        <TimerPedido p={pedidoActual} ahora={ahora}/>

      </div>

      {/* FAB ACCIÓN PRINCIPAL — fijo abajo, fácil acceso pulgar izquierdo */}
      {eb && (
        <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'12px 12px 28px',background:'linear-gradient(to top, #0F0F0F 60%, transparent)',zIndex:20}}>
          <button onClick={handleAvanzar} style={{width:'100%',padding:'18px 0',borderRadius:18,background:eb.color,color:'#fff',fontSize:17,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',gap:10,boxShadow:`0 0 24px ${eb.color}66`}}>
            {eb.lbl}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── HISTORIAL (agrupado por fecha, colapsable) ────────────
function HistorialTab({historial}){
  const [openDias,setOpenDias] = useState({});

  const fin = historial.filter(p=>p.estatus==='FINALIZADO'||p.est==='FINALIZADO');

  // Agrupar por fecha local Honduras
  const porDia = {};
  fin.forEach(p=>{
    const ts  = p.hora_finalizado||p.ts;
    const dia = ts ? new Date(ts).toLocaleDateString('es-HN',{timeZone:'America/Tegucigalpa',year:'numeric',month:'2-digit',day:'2-digit'}) : 'Sin fecha';
    const diaKey = ts ? new Date(ts).toISOString().slice(0,10) : 'sin-fecha';
    if(!porDia[diaKey]) porDia[diaKey]={label:dia,pedidos:[],total:0};
    const g = parseFloat(p.ingreso_delivery||p.gan||0);
    porDia[diaKey].pedidos.push({...p,_g:g});
    porDia[diaKey].total += g;
  });

  const dias = Object.keys(porDia).sort().reverse();

  const toggle = dia => setOpenDias(d=>({...d,[dia]:!d[dia]}));

  if(!dias.length) return(
    <div style={{textAlign:'center',padding:'60px 24px',color:'var(--txt3)'}}>
      <div style={{width:56,height:56,borderRadius:16,background:'var(--s2)',border:'1px solid var(--brd)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </div>
      <div style={{fontSize:16,fontWeight:600,color:'var(--txt)',marginBottom:6}}>Sin entregas aún</div>
      <div style={{fontSize:13,color:'var(--txt3)'}}>Tus pedidos finalizados aparecerán aquí</div>
    </div>
  );

  return(
    <div style={{paddingBottom:24}}>
      <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'16px 16px 10px'}}>
        Historial · {fin.length} entrega{fin.length!==1?'s':''}
      </div>
      {dias.map(dia=>{
        const info   = porDia[dia];
        const abierto = openDias[dia];
        const hoy    = new Date().toISOString().slice(0,10);
        const ayer   = new Date(Date.now()-86400000).toISOString().slice(0,10);
        const labelExtra = dia===hoy?' · Hoy':dia===ayer?' · Ayer':'';
        return(
          <div key={dia} style={{margin:'0 12px 8px',background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:'var(--r-md)',overflow:'hidden'}}>
            {/* Header de día — siempre visible */}
            <button onClick={()=>toggle(dia)}
              style={{width:'100%',padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--txt)',letterSpacing:'-0.01em'}}>
                  {info.label}<span style={{fontSize:11,fontWeight:500,color:'var(--brand)',marginLeft:6}}>{labelExtra}</span>
                </div>
                <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>
                  {info.pedidos.length} pedido{info.pedidos.length!==1?'s':''}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{fontSize:17,fontWeight:700,color:'var(--green)',letterSpacing:'-0.03em'}}>{fmtL(info.total)}</div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                  style={{color:'var(--txt3)',transform:abierto?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s'}}>
                  <path d="M6 9l6 6 6-6"/>
                </svg>
              </div>
            </button>
            {/* Filas de pedidos — solo cuando está abierto */}
            {abierto&&(
              <div style={{borderTop:'1px solid var(--brd)'}}>
                {info.pedidos.map((p,i)=>{
                  const hora = (p.hora_finalizado||p.ts)
                    ? new Date(p.hora_finalizado||p.ts).toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'})
                    : '—';
                  return(
                    <div key={p.id||i} style={{padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:i<info.pedidos.length-1?'1px solid var(--brd)':'none',background:'var(--s2)'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {p.nombre_comercio||p.com||'—'}
                        </div>
                        <div style={{display:'flex',gap:8,marginTop:2}}>
                          <span style={{fontSize:10,color:'var(--txt3)',fontVariantNumeric:'tabular-nums'}}>{p.no_orden||p.no||'—'}</span>
                          <span style={{fontSize:10,color:'var(--txt3)'}}>· {hora}</span>
                        </div>
                      </div>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--green)',letterSpacing:'-0.02em',flexShrink:0,marginLeft:12}}>
                        {fmtL(p._g)}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function TabGuaca({historial, saldo, movimientos, onIrDepositos, delivery}){
  const [desde,setDesde]   = useState('');
  const [hasta,setHasta]   = useState('');
  const [periodo,setPeriodo] = useState(''); // 'semana'|'mes'|'anterior'|'custom'
  const [verMasMovim,setVerMasMovim] = useState(false);
  const [recargas,setRecargas] = useState([]);

  const MIN = 50; // mínimo operativo L.50

  useEffect(()=>{
    if(!delivery?.id) return;
    sb.from('depositos_delivery')
      .select('id,monto,estatus,creado_at')
      .eq('delivery_id', delivery.id)
      .eq('estatus','APROBADO')
      .order('creado_at',{ascending:false})
      .limit(5)
      .then(({data})=>{ if(data) setRecargas(data); });
  },[delivery?.id]);

  // ── Cálculos de ganancias ─────────────────────────────────
  const fin = historial.filter(p=>p.estatus==='FINALIZADO'||p.est==='FINALIZADO');

  const ahora   = Date.now();
  const hoyIni  = new Date(); hoyIni.setHours(0,0,0,0);
  const ayerIni = new Date(hoyIni); ayerIni.setDate(ayerIni.getDate()-1);
  const ayerFin = new Date(hoyIni.getTime()-1);
  const lunSem  = new Date(hoyIni); lunSem.setDate(lunSem.getDate()-((lunSem.getDay()+6)%7));

  let tHoy=0,pH=0, tAyer=0,pA=0, tSem=0,pS=0;
  fin.forEach(p=>{
    // Ganancia = ingreso_delivery + propina (ambas van al rider)
    const g  = parseFloat(p.ingreso_delivery||p.gan||0) + parseFloat(p.propina||0);
    const ts = new Date(p.hora_finalizado||p.ts||0).getTime();
    if(ts >= hoyIni.getTime())            { tHoy+=g; pH++; }
    if(ts >= ayerIni.getTime() && ts <= ayerFin.getTime()) { tAyer+=g; pA++; }
    if(ts >= lunSem.getTime())            { tSem+=g; pS++; }
  });

  // ── Período personalizado ─────────────────────────────────
  const periodoRangos = {
    semana:   [lunSem.toISOString().slice(0,10), new Date().toISOString().slice(0,10)],
    mes:      [new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10), new Date().toISOString().slice(0,10)],
    anterior: [new Date(new Date().getFullYear(),new Date().getMonth()-1,1).toISOString().slice(0,10), new Date(new Date().getFullYear(),new Date().getMonth(),0).toISOString().slice(0,10)],
  };

  const d1Ef = periodo==='custom' ? desde : (periodoRangos[periodo]||[])[0]||'';
  const d2Ef = periodo==='custom' ? hasta  : (periodoRangos[periodo]||[])[1]||'';

  let rT=0,rC=0,rPropina=0,rKm=0;
  let tiemposTotales=[], tiemposSinEspera=[];
  if(d1Ef && d2Ef){
    const d1=new Date(d1Ef+'T00:00:00').getTime();
    const d2=new Date(d2Ef+'T23:59:59').getTime();
    fin.forEach(p=>{
      const ts=new Date(p.hora_finalizado||p.ts||0).getTime();
      if(ts>=d1&&ts<=d2){
        const prop = parseFloat(p.propina||0);
        rT  += parseFloat(p.ingreso_delivery||p.gan||0) + prop;
        rPropina += prop;
        rKm += parseFloat(p.distancia_km||0);
        rC++;
        // Tiempo total: hora_aceptado → hora_finalizado (en minutos)
        if(p.hora_aceptado && p.hora_finalizado){
          const tTotal = (new Date(p.hora_finalizado)-new Date(p.hora_aceptado))/60000;
          if(tTotal>0 && tTotal<300) tiemposTotales.push(tTotal);
          // Tiempo sin espera: descontamos tiempo en establecimiento
          // = hora_en_camino - hora_en_establecimiento (si existen)
          let espera = 0;
          if(p.hora_en_establecimiento && p.hora_en_camino){
            espera = (new Date(p.hora_en_camino)-new Date(p.hora_en_establecimiento))/60000;
            if(espera<0) espera=0;
          }
          const tSinEspera = tTotal - espera;
          if(tSinEspera>0 && tSinEspera<300) tiemposSinEspera.push(tSinEspera);
        }
      }
    });
  }
  const promTotal    = tiemposTotales.length    ? tiemposTotales.reduce((a,b)=>a+b,0)/tiemposTotales.length       : null;
  const promSinEsp   = tiemposSinEspera.length  ? tiemposSinEspera.reduce((a,b)=>a+b,0)/tiemposSinEspera.length   : null;
  const fmtMin = m => m===null?'—': m<60 ? `${Math.round(m)}m` : `${Math.floor(m/60)}h ${Math.round(m%60)}m`;

  // ── Estado saldo ──────────────────────────────────────────
  const bloqueado = saldo < MIN;
  const sBajo     = saldo < MIN;
  const sCerca    = saldo >= MIN && saldo < MIN*2;
  const sOk       = saldo >= MIN*2;
  const sColor    = sBajo?'var(--red)':sCerca?'var(--amber)':'var(--green)';
  const sBarPct   = Math.min(100, Math.max(0, (saldo / (MIN*4))*100));

  // ── Movimientos ───────────────────────────────────────────
  const movimVisibles = verMasMovim ? movimientos : movimientos.slice(0,5);

  const inp = {flex:1,background:'var(--s3)',border:'1px solid var(--brd)',borderRadius:'var(--r-sm)',padding:'9px 12px',color:'var(--txt)',fontSize:13,outline:'none',fontFamily:'inherit'};
  const lbl = {fontSize:10,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6,display:'block'};

  return(
    <div style={{paddingBottom:24}}>

      {/* ══ 1. GANANCIAS HERO ══════════════════════════════════ */}
      <div style={{margin:'12px 12px 8px'}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Ganancias</div>

        {/* Hoy — destacado */}
        <div style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:'var(--r-lg)',padding:'18px 20px',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Hoy</div>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
            <div style={{fontSize:40,fontWeight:800,color:'var(--green)',letterSpacing:'-0.04em',lineHeight:1}}>
              {fmtL(tHoy)}
            </div>
            <div style={{textAlign:'right',paddingBottom:4}}>
              <div style={{fontSize:24,fontWeight:700,color:'var(--txt)',letterSpacing:'-0.03em'}}>{pH}</div>
              <div style={{fontSize:11,color:'var(--txt3)',marginTop:1}}>pedido{pH!==1?'s':''}</div>
            </div>
          </div>

        </div>

        {/* Ayer + Esta semana */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['Ayer',tAyer,pA],['Esta semana',tSem,pS]].map(([lbl,t,p])=>(
            <div key={lbl} style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:'var(--r-md)',padding:'14px 16px'}}>
              <div style={{fontSize:10,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>{lbl}</div>
              <div style={{fontSize:22,fontWeight:700,color:'var(--txt)',letterSpacing:'-0.03em'}}>{fmtL(t)}</div>
              <div style={{fontSize:11,color:'var(--txt3)',marginTop:3}}>{p} pedido{p!==1?'s':''}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ══ 2. GANANCIAS POR PERÍODO ═══════════════════════════ */}
      <div style={{margin:'8px 12px'}}>
        <div style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:'var(--r-lg)',overflow:'hidden'}}>
          <div style={{padding:'14px 16px 10px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Ganancias por período</div>
            {/* Botones rápidos */}
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              {[['semana','Esta semana'],['mes','Este mes'],['anterior','Mes anterior'],['custom','Personalizado']].map(([id,lbl])=>(
                <button key={id} onClick={()=>setPeriodo(id===periodo?'':id)}
                  style={{flex:1,padding:'7px 4px',borderRadius:20,border:`1px solid ${periodo===id?'var(--brand)':'var(--brd)'}`,
                    background:periodo===id?'var(--brand-dim)':'transparent',
                    color:periodo===id?'var(--brand)':'var(--txt3)',
                    fontSize:10,fontWeight:600,letterSpacing:'.02em',cursor:'pointer',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {lbl}
                </button>
              ))}
            </div>
            {/* Fechas manuales solo si custom */}
            {periodo==='custom'&&(
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={inp}/>
                <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={inp}/>
              </div>
            )}
          </div>
          {/* Resultado */}
          <div style={{background:'var(--s2)',borderTop:'1px solid var(--brd)',padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:(d1Ef&&d2Ef&&rC>0)?12:0}}>
              <div>
                <div style={{fontSize:28,fontWeight:800,color:(d1Ef&&d2Ef)?'var(--green)':'var(--txt3)',letterSpacing:'-0.04em'}}>{(d1Ef&&d2Ef)?fmtL(rT):'—'}</div>
                <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>
                  {(d1Ef&&d2Ef)?`${rC} pedido${rC!==1?'s':''}  ·  ${d1Ef===d2Ef?d1Ef:`${d1Ef} → ${d2Ef}`}`:'Selecciona un período'}
                </div>
                {(d1Ef&&d2Ef&&rC>0)&&(
                  <div style={{fontSize:11,color:'var(--txt3)',marginTop:4}}>
                    Promedio por pedido: <span style={{color:'var(--green)',fontWeight:600}}>{fmtL(rT/rC)}</span>
                  </div>
                )}
              </div>
            </div>
            {/* Métricas del período — solo si hay datos */}
            {(d1Ef&&d2Ef&&rC>0)&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {[
                  rPropina>0      ? ['Propinas',        fmtL(rPropina),              'Incluidas en ganancia']  : null,
                  rKm>0           ? ['Kilómetros',       `${rKm.toFixed(1)} km`,      `${rC} pedido${rC!==1?'s':''}`] : null,
                  promTotal!==null? ['Tiempo completo',  fmtMin(promTotal),            'Acepta → finaliza']     : null,
                  promSinEsp!==null?['Sin espera',       fmtMin(promSinEsp),           'Descuenta establec.']   : null,
                ].filter(Boolean).map(([lbl,val,sub])=>(
                  <div key={lbl} style={{background:'var(--s3)',borderRadius:'var(--r-sm)',padding:'10px 12px'}}>
                    <div style={{fontSize:10,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{lbl}</div>
                    <div style={{fontSize:16,fontWeight:700,color:'var(--txt)',letterSpacing:'-0.02em'}}>{val}</div>
                    <div style={{fontSize:10,color:'var(--txt3)',marginTop:2}}>{sub}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ══ 3. SALDO ═══════════════════════════════════════════ */}
      <div style={{margin:'8px 12px'}}>
        <div style={{background:'var(--s1)',border:`1px solid ${sBajo?'rgba(239,68,68,.3)':sCerca?'rgba(245,158,11,.2)':'var(--brd)'}`,borderRadius:'var(--r-lg)',overflow:'hidden'}}>
          <div style={{padding:'16px 16px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Saldo billetera</div>
                <div style={{fontSize:38,fontWeight:800,color:sColor,letterSpacing:'-0.04em',lineHeight:1}}>
                  {fmtL(saldo)}
                </div>
                <div style={{fontSize:11,color:'var(--txt3)',marginTop:5}}>
                  Mínimo para operar: {fmtL(MIN)}
                </div>
              </div>
              <button onClick={onIrDepositos}
                style={{background:'var(--brand)',border:'none',borderRadius:'var(--r-md)',padding:'10px 18px',color:'#000',fontSize:13,fontWeight:700,flexShrink:0,letterSpacing:'-0.01em'}}>
                + Recargar
              </button>
            </div>
            {/* Barra */}
            <div style={{background:'var(--s3)',borderRadius:4,height:5,marginBottom:8,overflow:'hidden'}}>
              <div style={{height:'100%',background:sColor,borderRadius:4,width:`${sBarPct}%`,transition:'width .5s'}}/>
            </div>
            {/* Mensaje */}
            {sBajo&&<div style={{fontSize:12,fontWeight:600,color:'var(--red)',background:'var(--red-dim)',padding:'8px 12px',borderRadius:'var(--r-sm)'}}>Saldo insuficiente — recarga para recibir pedidos</div>}
            {sCerca&&<div style={{fontSize:12,fontWeight:600,color:'var(--amber)',background:'var(--amber-dim)',padding:'8px 12px',borderRadius:'var(--r-sm)'}}>Saldo bajo — recarga pronto</div>}
            {sOk&&<div style={{fontSize:12,fontWeight:500,color:'var(--green)',background:'var(--green-dim)',padding:'8px 12px',borderRadius:'var(--r-sm)'}}>Listo para recibir pedidos</div>}
          </div>

          {/* Recargas recientes */}
          {recargas.length>0&&(
            <div style={{borderTop:'1px solid var(--brd)'}}>
              <div style={{padding:'10px 16px 4px',fontSize:10,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em'}}>Últimas recargas</div>
              {recargas.map(r=>{
                const fecha=new Date(r.creado_at).toLocaleDateString('es-HN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'});
                return(
                  <div key={r.id} style={{padding:'9px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--brd)'}}>
                    <div style={{fontSize:12,color:'var(--txt2)'}}>{fecha}</div>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--green)'}}>+ {fmtL(parseFloat(r.monto))}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* ══ 4. MOVIMIENTOS ═════════════════════════════════════ */}
      {movimientos.length>0&&(
        <div style={{margin:'8px 12px'}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8,paddingLeft:2}}>Movimientos</div>
          <div style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:'var(--r-lg)',overflow:'hidden'}}>
            {movimVisibles.map((m,i)=>{
              // Solo mostrar liquidaciones (pagos de Somar) — las recargas ya aparecen arriba
              if(m.tipo==='RECARGA') return null;
              const fecha=new Date(m.ts).toLocaleDateString('es-HN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'});
              return(
                <div key={m.id||i} style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:i<movimVisibles.length-1?'1px solid var(--brd)':'none'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--txt)',marginBottom:2}}>Pago de Somar</div>
                    {m.nota&&<div style={{fontSize:11,color:'var(--txt3)'}}>{m.nota}</div>}
                    <div style={{fontSize:10,color:'var(--txt3)',marginTop:2}}>{fecha}</div>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:'var(--green)',flexShrink:0,marginLeft:12}}>
                    +{fmtL(Math.abs(m.monto))}
                  </div>
                </div>
              );
            })}
            {movimientos.length>5&&(
              <button onClick={()=>setVerMasMovim(v=>!v)}
                style={{width:'100%',padding:'12px',background:'none',border:'none',borderTop:'1px solid var(--brd)',color:'var(--brand)',fontSize:13,fontWeight:600,cursor:'pointer',letterSpacing:'-0.01em'}}>
                {verMasMovim?'Ver menos':'Ver más'}
              </button>
            )}
          </div>
        </div>
      )}

    </div>
  );
}


// ─── FORM DEPÓSITO ─────────────────────────────────────────
function DepForm({onEnviar, onConfirm}){
  const [monto,setMonto]=useState('');
  const [file,setFile]=useState(null);
  const [prev,setPrev]=useState(null);
  const [err,setErr]=useState('');
  const hFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const doSet=()=>{setFile(f);const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};
    onConfirm({msg:'¿Usar esta foto como comprobante?',confirmLbl:'Sí, usar esta foto',color:'#22C55E',onSi:doSet});
  };
  const enviar=()=>{
    if(!monto||parseFloat(monto)<=0)return setErr('Ingresa el monto');
    if(!file)return setErr('Sube la foto del comprobante');
    onEnviar(parseFloat(monto));setMonto('');setFile(null);setPrev(null);setErr('');
  };
  return(
    <div style={{margin:12,background:'#1A1A1A',border:'1px solid #333',borderRadius:16,padding:16}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>💳 Recargar Billetera</div>
      <div style={{fontSize:12,color:'#888',marginBottom:14}}>Sube el comprobante y Despacho aprobará la recarga</div>
      <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Monto depositado (L.)</label>
      <input type="number" inputMode="decimal" placeholder="0.00" value={monto} onChange={e=>setMonto(e.target.value)} style={{width:'100%',background:'#232323',border:'1.5px solid #444',borderRadius:12,padding:'15px 14px',color:'#F0F0F0',fontSize:20,fontWeight:800,outline:'none',marginBottom:14}}/>
      <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Foto del comprobante</label>
      <div onClick={()=>document.getElementById('depInp').click()} style={{background:'#232323',border:`2px ${prev?'solid':'dashed'} ${prev?'#22C55E':'#444'}`,borderRadius:14,padding:prev?0:20,textAlign:'center',overflow:'hidden',marginBottom:14}}>
        {prev?<img src={prev} style={{width:'100%',maxHeight:140,objectFit:'cover',display:'block'}}/>:<><div style={{fontSize:32,marginBottom:6}}>📷</div><div style={{fontSize:14,fontWeight:700}}>Tomar foto del comprobante</div><div style={{fontSize:12,color:'#888',marginTop:4}}>Toca aquí para abrir la cámara</div></>}
      </div>
      <input type="file" id="depInp" accept="image/*" capture="environment" style={{display:'none'}} onChange={hFile}/>
      {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:10}}>{err}</div>}
      <button onClick={enviar} style={{width:'100%',padding:16,borderRadius:14,background:'#FF8C00',color:'#fff',fontSize:16,fontWeight:800}}>Enviar Depósito</button>
      {/* Transferencias de Somar al rider */}
      {liquidaciones&&liquidaciones.filter(l=>l.estatus==='PENDIENTE').length>0&&(
        <div style={{margin:'12px 12px 0',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.3)',borderRadius:14,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'#3B82F6',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>
            💳 Somar te debe · {liquidaciones.filter(l=>l.estatus==='PENDIENTE').length} transferencia{liquidaciones.filter(l=>l.estatus==='PENDIENTE').length!==1?'s':''}
          </div>
          {liquidaciones.filter(l=>l.estatus==='PENDIENTE').map(l=>(
            <div key={l.id} style={{background:'rgba(0,0,0,.2)',borderRadius:10,padding:'10px 12px',marginBottom:6}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:12,color:'#ccc',flex:1,marginRight:8}}>{l.descripcion||'Liquidación pendiente'}</div>
                <div style={{fontSize:17,fontWeight:900,color:'#3B82F6',flexShrink:0}}>L. {parseFloat(l.monto_liquidar).toFixed(2)}</div>
              </div>
              <div style={{fontSize:10,color:'#666',marginTop:3}}>⏳ {new Date(l.creado_at).toLocaleDateString('es-HN',{day:'2-digit',month:'short',timeZone:'America/Tegucigalpa'})}</div>
            </div>
          ))}
        </div>
      )}
      {liquidaciones&&liquidaciones.filter(l=>l.estatus==='LIQUIDADO').length>0&&(
        <div style={{margin:'6px 12px 0'}}>
          {liquidaciones.filter(l=>l.estatus==='LIQUIDADO').slice(0,3).map(l=>(
            <div key={l.id} style={{background:'#1A1A1A',borderRadius:10,padding:'10px 12px',marginBottom:6,borderLeft:'3px solid #22C55E'}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <div style={{fontSize:12,color:'#ccc',flex:1}}>{l.descripcion||'Transferencia recibida'}</div>
                <div style={{fontSize:14,fontWeight:800,color:'#22C55E'}}>L. {parseFloat(l.monto_liquidar).toFixed(2)}</div>
              </div>
              <div style={{fontSize:10,color:'#555',marginTop:2}}>✅ Recibido</div>
            </div>
          ))}
        </div>
      )}

    </div>
  );
}

function AuthScreen({onLogin}){
  const [vista,setVista]   = useState('login');
  const [email,setEmail]   = useState('');
  const [pwd,setPwd]       = useState('');
  const [err,setErr]       = useState('');
  const [cargando,setCargando] = useState(false);
  const _reg = useRef(false);

  // ── Login ─────────────────────────────────────────────────
  const login = async () => {
    if(!email||!pwd) return setErr('Completa todos los campos');
    setCargando(true); setErr('');
    const {error} = await sb.auth.signInWithPassword({email, password:pwd});
    if(error) setErr('Correo o contraseña incorrectos');
    setCargando(false);
  };

  // ── Campos del registro ───────────────────────────────────
  const [reg,setReg] = useState({nombre:'',celular:'',email:'',pwd:'',pwd2:'',cuenta_bac:'',tiene_mochila:false});
  const [regErr,setRegErr]       = useState('');
  const [regCargando,setRegCargando] = useState(false);
  const [paso,setPaso]           = useState(1); // 1=datos, 2=fotos, 3=extras

  // Fotos
  const [fotos,setFotos] = useState({dui:null,licencia:null,revision:null,vehiculo:null,mochila:null,perfil:null});
  const [prevs,setPrevs] = useState({dui:null,licencia:null,revision:null,vehiculo:null,mochila:null,perfil:null});

  const setFoto = (key,file) => {
    setFotos(f=>({...f,[key]:file}));
    const r=new FileReader(); r.onload=e=>setPrevs(p=>({...p,[key]:e.target.result})); r.readAsDataURL(file);
  };

  const inp = {width:'100%',background:'var(--s2)',border:'1.5px solid var(--brd)',borderRadius:'var(--r-sm)',padding:'14px 16px',color:'var(--txt)',fontSize:15,outline:'none',fontFamily:'Inter,system-ui,sans-serif',letterSpacing:'-0.01em'};
  const lbl = {fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:6};

  // ── Subir foto a Supabase Storage ─────────────────────────
  const upFoto = async (uid,file,nombre) => {
    if(!file) return null;
    const ext = file.name.split('.').pop()?.toLowerCase()||'jpg';
    const path = `${uid}/${nombre}_${Date.now()}.${ext}`;
    const {data,error} = await sb.storage.from('delivery-docs').upload(path,file,{cacheControl:'3600',upsert:true,contentType:file.type});
    if(error){ console.warn('[foto]',nombre,error.message); return null; }
    const {data:u} = await sb.storage.from('delivery-docs').createSignedUrl(data.path,60*60*24*365*10);
    return u?.signedUrl||null;
  };

  // ── Validaciones por paso ─────────────────────────────────
  const validarPaso1 = () => {
    if(!reg.nombre.trim()) return 'El nombre es requerido';
    if(!reg.celular.trim()) return 'El celular es requerido';
    if(!reg.email.trim()) return 'El correo es requerido';
    if(!reg.pwd) return 'La contraseña es requerida';
    if(reg.pwd.length<8) return 'Contraseña mínimo 8 caracteres';
    if(reg.pwd!==reg.pwd2) return 'Las contraseñas no coinciden';
    return null;
  };

  const validarPaso2 = () => {
    if(!fotos.perfil)   return 'Sube tu foto de perfil';
    if(!fotos.dui)      return 'Sube la foto del DNI';
    if(!fotos.licencia) return 'Sube la foto de la licencia';
    if(!fotos.revision) return 'Sube la foto de la revisión del vehículo';
    if(!fotos.vehiculo) return 'Sube la foto del vehículo';
    return null;
  };

  const validarPaso3 = () => {
    if(!reg.cuenta_bac.trim()) return 'El número de cuenta BAC es requerido';
    if(reg.tiene_mochila && !fotos.mochila) return 'Sube la foto de tu mochila de delivery';
    return null;
  };

  // ── Submit final ──────────────────────────────────────────
  const registro = async () => {
    const e3 = validarPaso3();
    if(e3){ setRegErr(e3); return; }
    if(_reg.current) return;
    _reg.current=true; setRegCargando(true); setRegErr('');
    try {
      // 1. Crear cuenta en Auth
      const {data:su,error:suErr} = await sb.auth.signUp({email:reg.email,password:reg.pwd});
      if(suErr){ setRegErr(suErr.message); return; }
      const uid = su?.user?.id;
      if(!uid){ setRegErr('Error al crear cuenta'); return; }
      if(su.session?.access_token)
        await sb.auth.setSession({access_token:su.session.access_token,refresh_token:su.session.refresh_token});

      // 2. Subir fotos en paralelo
      const [duiUrl,licUrl,revUrl,vehUrl,mochUrl,perfUrl] = await Promise.all([
        upFoto(uid,fotos.dui,'dui'),
        upFoto(uid,fotos.licencia,'licencia'),
        upFoto(uid,fotos.revision,'revision'),
        upFoto(uid,fotos.vehiculo,'vehiculo'),
        upFoto(uid,fotos.mochila,'mochila'),
        upFoto(uid,fotos.perfil,'perfil'),
      ]);

      // 3. Insertar solicitud
      const {data:{session:ses}} = await sb.auth.getSession();
      const body = {
        nombre:       reg.nombre,
        celular:      reg.celular,
        correo:       reg.email,
        identidad_delantera_url: duiUrl,
        moto_propia_url:         vehUrl,
        estatus:      'PENDIENTE',
        notas:        `auth_uid:${uid} | licencia:${licUrl||'—'} | revision:${revUrl||'—'} | mochila_foto:${mochUrl||'—'} | perfil:${perfUrl||'—'} | cuenta_bac:${reg.cuenta_bac} | mochila:${reg.tiene_mochila?'SI':'NO'}`,
      };
      const _res = await fetch(SUPA_URL+'/rest/v1/aplicaciones_delivery',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_ANON,
          'Authorization':'Bearer '+(ses?.access_token||SUPA_ANON),'Prefer':'return=minimal'},
        body: JSON.stringify(body),
      });
      if(!_res.ok){
        const _eb = await _res.json().catch(()=>({}));
        setRegErr('Error al enviar solicitud: '+(_eb?.message||_eb?.error||_res.status));
        return;
      }
      setVista('pendiente');
    } catch(e){ setRegErr('Error inesperado: '+e.message); }
    finally { setRegCargando(false); _reg.current=false; }
  };

  // ── Foto upload card ──────────────────────────────────────
  const FotoCard = ({id,label,fotoKey}) => (
    <div style={{marginBottom:14}}>
      <label style={lbl}>{label}</label>
      <div onClick={()=>document.getElementById('rf_'+fotoKey).click()}
        style={{background:'var(--s2)',border:`2px ${prevs[fotoKey]?'solid var(--green)':'dashed var(--brd2)'}`,
          borderRadius:'var(--r-md)',overflow:'hidden',cursor:'pointer',minHeight:80,
          display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
        {prevs[fotoKey]
          ? <img src={prevs[fotoKey]} style={{width:'100%',maxHeight:120,objectFit:'cover',display:'block'}}/>
          : <div style={{textAlign:'center',padding:16}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:6,display:'block',margin:'0 auto 6px'}}><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <div style={{fontSize:12,color:'var(--txt3)'}}>Toca para seleccionar</div>
            </div>
        }
        {prevs[fotoKey]&&<div style={{position:'absolute',top:6,right:6,background:'var(--green)',borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700,color:'#000'}}>✓</div>}
      </div>
      <input type="file" id={'rf_'+fotoKey} accept="image/*" capture="environment" style={{display:'none'}}
        onChange={e=>{const f=e.target.files[0];if(f)setFoto(fotoKey,f);e.target.value='';}}/>
    </div>
  );

  // ── Pantalla pendiente ────────────────────────────────────
  if(vista==='pendiente') return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'radial-gradient(ellipse at top,#1f0a00,#0F0F0F)'}}>
      <div style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:20,padding:28,width:'100%',maxWidth:400,textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:20,background:'var(--amber-dim)',border:'1px solid var(--amber)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        </div>
        <h2 style={{fontSize:19,fontWeight:700,marginBottom:8,letterSpacing:'-0.02em'}}>Solicitud Enviada</h2>
        <p style={{color:'var(--txt2)',fontSize:14,lineHeight:1.7}}>Tu cuenta está siendo revisada por Despacho.<br/>Te notificaremos cuando sea aprobada.</p>
        <button onClick={()=>sb.auth.signOut().then(()=>setVista('login'))}
          style={{marginTop:24,background:'none',border:'1px solid var(--brd)',borderRadius:'var(--r-sm)',padding:'10px 20px',color:'var(--txt2)',fontSize:14,width:'100%'}}>
          Cerrar sesión
        </button>
      </div>
    </div>
  );

  // ── Pantalla registro multi-paso ──────────────────────────
  if(vista==='registro') return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at top,#1f0a00,#0F0F0F)',padding:'20px 16px',overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:440,margin:'0 auto'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20,paddingTop:8}}>
          <button onClick={()=>paso===1?setVista('login'):setPaso(p=>p-1)}
            style={{background:'none',border:'none',color:'var(--txt2)',fontSize:22,padding:4,lineHeight:1}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,letterSpacing:'-0.02em'}}>Solicitar cuenta</div>
            <div style={{fontSize:12,color:'var(--txt3)'}}>Paso {paso} de 3</div>
          </div>
          {/* Barra de progreso */}
          <div style={{display:'flex',gap:4}}>
            {[1,2,3].map(n=>(
              <div key={n} style={{width:24,height:4,borderRadius:4,background:n<=paso?'var(--brand)':'var(--s3)',transition:'background .2s'}}/>
            ))}
          </div>
        </div>

        <div style={{background:'var(--s1)',border:'1px solid var(--brd)',borderRadius:20,padding:24}}>

          {/* ── PASO 1: Datos personales ── */}
          {paso===1&&(
            <div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:'var(--txt)'}}>Datos personales</div>
              {[
                ['nombre','Nombre completo','text','Ej: Juan Pérez'],
                ['celular','Celular','tel','+504 9999-9999'],
                ['email','Correo electrónico','email','correo@ejemplo.com'],
              ].map(([k,lbl,t,ph])=>(
                <div key={k} style={{marginBottom:12}}>
                  <label style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:6}}>{lbl}</label>
                  <input type={t} placeholder={ph} value={reg[k]}
                    onChange={e=>setReg(r=>({...r,[k]:e.target.value}))} style={inp}/>
                </div>
              ))}
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:6}}>Contraseña</label>
                <input type="password" placeholder="Mínimo 8 caracteres" value={reg.pwd}
                  onChange={e=>setReg(r=>({...r,pwd:e.target.value}))} style={inp}/>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:6}}>Confirmar contraseña</label>
                <input type="password" placeholder="Repite tu contraseña" value={reg.pwd2}
                  onChange={e=>setReg(r=>({...r,pwd2:e.target.value}))} style={inp}/>
              </div>
              {regErr&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12,padding:'8px 12px',background:'var(--red-dim)',borderRadius:'var(--r-sm)'}}>{regErr}</div>}
              <button onClick={()=>{const e=validarPaso1();if(e){setRegErr(e);return;}setRegErr('');setPaso(2);}}
                style={{width:'100%',padding:15,borderRadius:'var(--r-md)',background:'var(--brand)',color:'#000',fontSize:15,fontWeight:700}}>
                Continuar →
              </button>
            </div>
          )}

          {/* ── PASO 2: Documentos y fotos ── */}
          {paso===2&&(
            <div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:'var(--txt)'}}>Documentos y fotos</div>
              <div style={{fontSize:12,color:'var(--txt3)',marginBottom:16}}>Asegúrate de que las fotos sean legibles y claras</div>
              <FotoCard fotoKey="perfil"   label="Foto de perfil (selfie)"/>
              <FotoCard fotoKey="dui"      label="Foto del DNI (identidad)"/>
              <FotoCard fotoKey="licencia" label="Foto de la licencia de conducir"/>
              <FotoCard fotoKey="revision" label="Foto de la revisión del vehículo"/>
              <FotoCard fotoKey="vehiculo" label="Foto del vehículo"/>
              {regErr&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12,padding:'8px 12px',background:'var(--red-dim)',borderRadius:'var(--r-sm)'}}>{regErr}</div>}
              <button onClick={()=>{const e=validarPaso2();if(e){setRegErr(e);return;}setRegErr('');setPaso(3);}}
                style={{width:'100%',padding:15,borderRadius:'var(--r-md)',background:'var(--brand)',color:'#000',fontSize:15,fontWeight:700}}>
                Continuar →
              </button>
            </div>
          )}

          {/* ── PASO 3: Datos extras ── */}

// ─── CHAT ─────────────────────────────────────────────────
function TabChat({delivery, chatUnread, setChatUnread}){
  const [abierto,setAbierto]   = useState(false);
  const [msgs,setMsgs]         = useState([]);
  const [texto,setTexto]       = useState('');
  const [cargando,setCargando] = useState(false);
  const [enviando,setEnviando] = useState(false);
  const [imgFile,setImgFile]   = useState(null);
  const [imgPreview,setImgPreview] = useState(null);
  const listRef = useRef(null);
  const chRef   = useRef(null);
  const inputRef = useRef(null);

  // Cargar mensajes y suscribirse al abrir la conversación
  useEffect(()=>{
    if(!abierto || !delivery?.id) return;
    setCargando(true);
    sb.from('chat_mensajes')
      .select('*').eq('delivery_id',delivery.id)
      .order('created_at',{ascending:true}).limit(200)
      .then(({data})=>{ setMsgs(data||[]); setCargando(false); });
    // Marcar como leídos
    sb.from('chat_mensajes')
      .update({leido:true,leido_at:new Date().toISOString()})
      .eq('delivery_id',delivery.id).eq('remitente','DESPACHO').eq('leido',false);
    if(setChatUnread) setChatUnread(0);
    // Realtime
    chRef.current = sb.channel('chat_rider_'+delivery.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_mensajes',
        filter:'delivery_id=eq.'+delivery.id}, p=>{
        setMsgs(ms=>[...ms,p.new]);
        if(p.new.remitente==='DESPACHO')
          sb.from('chat_mensajes').update({leido:true,leido_at:new Date().toISOString()}).eq('id',p.new.id);
      }).subscribe();
    return ()=>{ if(chRef.current){ sb.removeChannel(chRef.current); chRef.current=null; } };
  },[abierto, delivery?.id]);

  // Scroll al fondo al llegar mensajes
  useEffect(()=>{
    if(listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  },[msgs]);

  // Bloquear scroll del body cuando chat está abierto
  useEffect(()=>{
    document.body.style.overflow = abierto ? 'hidden' : '';
    return ()=>{ document.body.style.overflow = ''; };
  },[abierto]);

  const abrir = () => setAbierto(true);
  const cerrar = () => { setAbierto(false); setMsgs([]); setTexto(''); };

  const enviar = async () => {
    const msg = texto.trim();
    if((!msg&&!imgFile)||enviando||!delivery?.id) return;
    setEnviando(true); setTexto('');
    let imagen_url = null;
    if(imgFile){
      try{
        const ext = imgFile.name.split('.').pop()?.toLowerCase()||'jpg';
        const {data:upData,error:upErr} = await sb.storage.from('delivery-docs')
          .upload(`chat/${delivery.id}_${Date.now()}.${ext}`,imgFile,
            {cacheControl:'3600',upsert:true,contentType:imgFile.type});
        if(!upErr&&upData){
          const {data:urlData} = await sb.storage.from('delivery-docs')
            .createSignedUrl(upData.path, 60*60*24*365*10);
          imagen_url = urlData?.signedUrl||null;
        }
      }catch(e){ console.error('[chat img]',e); }
      setImgFile(null); setImgPreview(null);
    }
    const {error} = await sb.from('chat_mensajes').insert({
      delivery_id:delivery.id, remitente:'DELIVERY', mensaje:msg||null, imagen_url
    });
    if(error) setTexto(msg);
    setEnviando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const ultimo = msgs[msgs.length-1];
  const ultimaHora = ultimo
    ? new Date(ultimo.created_at).toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'})
    : null;

  return(
    <>
      {/* ── LISTADO (pantalla principal del tab) ── */}
      <div style={{paddingBottom:8}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'16px 16px 10px'}}>
          Mensajes
        </div>
        {/* Card de conversación con Despacho */}
        <button onClick={abrir}
          style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
            background:'none',border:'none',borderBottom:'1px solid var(--brd)',cursor:'pointer',textAlign:'left'}}>
          <div style={{position:'relative',flexShrink:0}}>
            <div style={{width:52,height:52,borderRadius:16,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </div>
            {chatUnread>0&&(
              <div style={{position:'absolute',top:-4,right:-4,width:18,height:18,background:'var(--red)',borderRadius:'50%',fontSize:10,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {chatUnread>9?'9+':chatUnread}
              </div>
            )}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--txt)',marginBottom:3}}>Despacho Somar Express</div>
            <div style={{fontSize:13,color:'var(--txt3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {ultimo
                ? (ultimo.remitente==='DELIVERY'?'Tú: ':'')+( ultimo.mensaje||'📷 Imagen')
                : 'Escríbele a Despacho'}
            </div>
          </div>
          <div style={{flexShrink:0,textAlign:'right'}}>
            {ultimaHora&&<div style={{fontSize:11,color:'var(--txt3)',marginBottom:4}}>{ultimaHora}</div>}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </button>
      </div>

      {/* ── CONVERSACIÓN (overlay fullscreen estilo WhatsApp) ── */}
      {abierto&&(
        <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--bg)',display:'flex',flexDirection:'column'}}>

          {/* Header */}
          <div style={{background:'var(--s1)',borderBottom:'1px solid var(--brd)',
            padding:'10px 14px',display:'flex',alignItems:'center',gap:12,
            flexShrink:0,paddingTop:'max(10px, env(safe-area-inset-top))'}}>
            <button onClick={cerrar}
              style={{background:'none',border:'none',color:'var(--txt)',padding:4,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
              </svg>
            </button>
            <div style={{width:38,height:38,borderRadius:12,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:'var(--txt)'}}>Despacho Somar Express</div>
              <div style={{fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'pulse 2s infinite'}}/>
                En línea
              </div>
            </div>
          </div>

          {/* Mensajes */}
          <div ref={listRef}
            style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'12px 14px',
              display:'flex',flexDirection:'column',gap:8,WebkitOverflowScrolling:'touch'}}>
            {cargando&&<div style={{textAlign:'center',color:'var(--txt3)',padding:30}}>Cargando...</div>}
            {!cargando&&msgs.length===0&&(
              <div style={{textAlign:'center',padding:'60px 24px',color:'var(--txt3)'}}>
                <div style={{fontSize:14}}>Escríbele a Despacho aquí</div>
              </div>
            )}
            {msgs.map(m=>{
              const mio = m.remitente==='DELIVERY';
              const agente = m.remitente_nombre;
              const COLORES=['#FF8C00','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F59E0B'];
              const colorIdx = agente ? Math.abs(agente.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0))%COLORES.length : 0;
              const aColor = COLORES[colorIdx];
              const hora = new Date(m.created_at).toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'});
              return(
                <div key={m.id} style={{display:'flex',justifyContent:mio?'flex-end':'flex-start',marginBottom:2}}>
                  {!mio&&(
                    <div style={{width:28,height:28,background:aColor,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0,marginRight:8,alignSelf:'flex-end',color:'#fff'}}>
                      {agente?agente.charAt(0).toUpperCase():'D'}
                    </div>
                  )}
                  <div style={{maxWidth:'75%'}}>
                    {!mio&&agente&&<div style={{fontSize:10,fontWeight:700,color:aColor,marginBottom:2,paddingLeft:2}}>{agente}</div>}
                    <div style={{background:mio?'var(--brand)':'var(--s2)',color:mio?'#000':'var(--txt)',
                      borderRadius:mio?'18px 18px 4px 18px':'18px 18px 18px 4px',
                      padding:'10px 14px',fontSize:14,lineHeight:1.5,
                      ...(mio?{}:{borderLeft:`2px solid ${aColor}`})}}>
                      {m.mensaje&&<div>{m.mensaje}</div>}
                      {m.imagen_url&&(
                        <img src={m.imagen_url} onClick={()=>window.open(m.imagen_url)}
                          style={{maxWidth:'220px',maxHeight:'200px',borderRadius:10,display:'block',
                            marginTop:m.mensaje?8:0,cursor:'pointer',objectFit:'cover'}} loading="lazy"/>
                      )}

                    <div style={{fontSize:10,color:'var(--txt3)',marginTop:3,textAlign:mio?'right':'left'}}>
                      {hora}{mio&&<span style={{marginLeft:4}}>{m.leido?'✓✓':'✓'}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Input */}
          <div style={{background:'var(--s1)',borderTop:'1px solid var(--brd)',
            padding:'8px 12px',flexShrink:0,
            paddingBottom:'max(8px, env(safe-area-inset-bottom))'}}>
