// AUDIO + VIBRACIÓN — Delivery (Android PWA)
// ════════════════════════════════════════════════════════════
const _AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
let _audioOk = false;

function _getCtx() {
  if(!_actx && _AudioCtx) { try { _actx = new _AudioCtx(); } catch(e){} }
  if(_actx && _actx.state === 'suspended') { try { _actx.resume(); } catch(e){} }
  return _actx;
}

// Desbloquear en cualquier interacción del usuario
function _desbloquear() {
  if(_audioOk) return;
  try {
    const ctx = _getCtx();
    if(ctx) {
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      _audioOk = true;
    }
  } catch(e) {}
}
['click','touchstart','touchend','keydown','pointerdown'].forEach(ev =>
  document.addEventListener(ev, _desbloquear, {passive:true})
);

function _beep(freq=880, dur=0.15, vol=0.6, type='sine') {
  try {
    const ctx = _getCtx();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) { console.warn('[audio]', e.message); }
}

function _vibrar(p) {
  try { if('vibrate' in navigator) navigator.vibrate(p); } catch(e) {}
}

// ── Alarma pedido entrante (se repite hasta que se acepta/rechaza) ──────────
let _alarmInt = null;
function iniciarAlarma() {
  _detenerAlarma();
  _desbloquear();
  const tocar = () => {
    _beep(880, 0.1, 0.8, 'square');
    setTimeout(() => _beep(1100, 0.1, 0.8, 'square'), 140);
    setTimeout(() => _beep(880,  0.1, 0.8, 'square'), 280);
    setTimeout(() => _beep(1100, 0.15,0.8, 'square'), 420);
    _vibrar([300, 100, 300, 100, 300, 100, 300]);
  };
  tocar();
  _alarmInt = setInterval(tocar, 1400);
}
function _detenerAlarma() {
  if(_alarmInt) { clearInterval(_alarmInt); _alarmInt = null; }
  _vibrar([0]);
}
function detenerAlarma() { _detenerAlarma(); }

// ── Avanzó de estado ──────────────────────────────────────────────────────
function sonarEstadoAvanzado() {
  _beep(660, 0.08, 0.5, 'sine');
  setTimeout(() => _beep(880, 0.15, 0.5, 'sine'), 100);
  _vibrar([80, 40, 160]);
}

// ── Pedido finalizado ─────────────────────────────────────────────────────
function sonarFinalizado() {
  _beep(523, 0.08, 0.5, 'sine');
  setTimeout(() => _beep(659, 0.08, 0.5, 'sine'), 90);
  setTimeout(() => _beep(784, 0.08, 0.5, 'sine'), 180);
  setTimeout(() => _beep(1047,0.25, 0.6, 'sine'), 270);
  _vibrar([80, 50, 80, 50, 300]);
}

// ── Mensaje de chat entrante ──────────────────────────────────────────────

  setTimeout(() => _beep(880, 0.12, 0.4, 'sine'), 95);
  _vibrar([60, 30, 60]);
}

// ── Depósito aprobado ─────────────────────────────────────────────────────
function sonarDepositoAprobado() {
  _beep(523, 0.08, 0.4, 'sine');
  setTimeout(() => _beep(784, 0.2,  0.5, 'sine'), 100);
  _vibrar([100, 50, 200]);

// ─── PEDIDO ENTRANTE ───────────────────────────────────────
// ACEPTAR: zona grande izquierda | RECHAZAR: franja pequeña derecha
function PedidoEntrante({pedido, onAceptar, onRechazar}){
  const [seg, setSeg] = useState(30);
  const [procesando, setProcesando] = useState(false);
  const tmr = useRef(null);
  const fired = useRef(false);
  const CIRC = 150.8;

  const [distReal, setDistReal] = useState(km);

  useEffect(()=>{
    // Calcular distancia real rider→recolecta en tiempo real
    const gpsRec = pedido.ubicacion_recogida_gps || pedido.co;
    if(gpsRec && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        const latR = parseFloat(gpsRec.split(',')[0]);
        const lngR = parseFloat(gpsRec.split(',')[1]);
        if(latR && lngR){
          const R=6371, lat1=pos.coords.latitude*Math.PI/180, lat2=latR*Math.PI/180;
          const dLat=(latR-pos.coords.latitude)*Math.PI/180;
          const dLng=(lngR-pos.coords.longitude)*Math.PI/180;
          const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
          const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
          setDistReal(d);
        }
      },()=>{},{enableHighAccuracy:true,timeout:5000,maximumAge:30000});
    }
  },[pedido?.id]);

  useEffect(()=>{
    setSeg(30);
    fired.current = false;
    setProcesando(false);
    tmr.current = setInterval(()=>{
      setSeg(s=>{
        if(s<=1){
          clearInterval(tmr.current);
          if(!fired.current){ fired.current=true; onRechazar(); }
          return 0;
        }
        return s-1;
      });
    },1000);
    return ()=>{ clearInterval(tmr.current); };
  },[pedido?.id]);

  if(!pedido) return null;
  const pct = Math.max(0, seg/30);
  const offset = CIRC - pct * CIRC;
  // Valores seguros — nunca undefined
  const com    = pedido.com    || pedido.nombre_comercio  || '—';
  const ciudad = pedido.ciudad || pedido.ciudad_destino   || '—';
  const km = parseFloat(pedido.km || pedido.distancia_km || 0);
  const gan    = parseFloat(pedido.gan || pedido.ingreso_delivery || 0);
  const pago   = pedido.pago   || pedido.metodo_pago      || 'EFECTIVO';
  const tipo   = pedido.tipo   || 'DELIVERY';

  const handleAceptar = () => {
    if(procesando) return;
    setProcesando(true);
    clearInterval(tmr.current);
    fired.current = true;
    onAceptar();
  };
  const handleRechazar = () => {
    if(procesando) return;
    setProcesando(true);
    clearInterval(tmr.current);
    fired.current = true;
    onRechazar();
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:180,display:'flex',flexDirection:'column'}}>
      {/* Info arriba */}
      <div style={{background:'linear-gradient(180deg,rgba(0,0,0,.97),rgba(0,0,0,.85))',flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'24px 20px',gap:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1,paddingRight:12}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.6)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>🔔 Nuevo Pedido</div>
            <div style={{fontSize:24,fontWeight:900,lineHeight:1.2}}>{com}</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.7)',marginTop:4}}>{tipo==='DELIVERY'?'📦 Delivery':'🛒 Compra'}</div>
          </div>
          {/* Countdown */}
          <div style={{position:'relative',width:64,height:64,flexShrink:0}}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{transform:'rotate(-90deg)'}}>
              <circle fill="none" stroke="#333" strokeWidth="5" cx="32" cy="32" r="27"/>
              <circle fill="none" stroke={pct>0.3?'#FF8C00':'#EF4444'} strokeWidth="5" strokeLinecap="round"
                strokeDasharray={CIRC} strokeDashoffset={offset}
                cx="32" cy="32" r="27" style={{transition:'stroke-dashoffset .95s linear, stroke .3s'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:900,color:pct>0.3?'#FF8C00':'#EF4444'}}>{seg}</div>
          </div>
        </div>
        {/* Info rápida */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[
            ['📍 Destino',    ciudad],
            ['📏 Distancia',  distReal > 0 ? `${distReal.toFixed(1)} km` : 'N/D'],
            ['💳 Pago',       pago==='EFECTIVO'?'Efectivo':'Transferencia'],
            ['💰 Tu ganancia',fmtL(gan)],
          ].map(([l,v])=>(
            <div key={l} style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:'10px 12px'}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)',fontWeight:600,marginBottom:3}}>{l}</div>
              <div style={{fontSize:14,fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>
        {procesando && <div style={{textAlign:'center',fontSize:13,color:'#888',marginTop:8}}>Procesando...</div>}
      </div>

      {/* BOTONES */}
      <div style={{display:'flex',height:110,background:'#0F0F0F',flexShrink:0}}>
        {/* ACEPTAR */}
        <button
          onClick={handleAceptar}
          disabled={procesando}
          style={{flex:3,background:procesando?'#1a4a1a':'#22C55E',color:'#fff',fontSize:22,fontWeight:900,
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            borderRight:'2px solid #0F0F0F',border:'none',cursor:procesando?'default':'pointer',
            WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
          <span style={{fontSize:32}}>✓</span> ACEPTAR
        </button>
        {/* RECHAZAR */}
        <button
          onClick={handleRechazar}
          disabled={procesando}
          style={{flex:1,background:'#1A1A1A',color:procesando?'#444':'#EF4444',fontSize:13,fontWeight:700,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,
            border:'none',cursor:procesando?'default':'pointer',
            WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
          <span style={{fontSize:24}}>✕</span>
          Rechazar
        </button>
      </div>
    </div>
  );
}

// ─── TIMER HELPERS ──────────────────────────────────────────
function fmtDur(ms){
  if(ms<0)ms=0;
  const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000);
  return m>0?`${m}m ${s}s`:`${s}s`;
}

const ESTADO_ORDER = ['ACEPTADO','EN_ESTABLECIMIENTO','PEDIDO_EN_CAMINO','ENTREGANDO','FINALIZADO'];
const ESTADO_LABEL_CORTO = {
  ACEPTADO:'Aceptado', EN_ESTABLECIMIENTO:'En Estab.', 
  PEDIDO_EN_CAMINO:'En Camino', ENTREGANDO:'Entregando', FINALIZADO:'Finalizado'
};

function TimerPedido({p, ahora}){
  const tiempos = p.tiempos || {};
  const tsInicio = p.tsInicio || ahora;
  const totalMs = ahora - tsInicio;

  // Calcular duración de cada estado completado
  const estados = ESTADO_ORDER.filter(e => tiempos[e]);
  const duraciones = estados.map((est, i) => {
    const inicio = tiempos[est];
    const siguiente = estados[i+1] ? tiempos[estados[i+1]] : (p.est===est ? ahora : null);
    return { est, dur: siguiente ? siguiente - inicio : ahora - inicio, activo: p.est===est };
  });

  return(
    <div style={{padding:'10px 14px',borderTop:'1px solid #222',background:'rgba(255,255,255,.02)'}}>
      {/* Tiempo total */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:11,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>⏱ Tiempo Total</span>
        <span style={{fontSize:15,fontWeight:900,fontFamily:'monospace',color:'#FF8C00'}}>{fmtDur(totalMs)}</span>
      </div>
      {/* Por estado */}
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {duraciones.map(({est,dur,activo})=>(
          <div key={est} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {activo && <div style={{width:6,height:6,borderRadius:'50%',background:'#FF8C00',animation:'pulse 1.5s infinite'}}/>}
              {!activo && <div style={{width:6,height:6,borderRadius:'50%',background:'#444'}}/>}
              <span style={{fontSize:11,color:activo?'#F0F0F0':'#666',fontWeight:activo?700:400}}>{ESTADO_LABEL_CORTO[est]}</span>
            </div>
            <span style={{fontSize:11,fontFamily:'monospace',color:activo?'#FF8C00':'#555',fontWeight:activo?800:400}}>{fmtDur(dur)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MI GUACA ─────────────────────────────────────────────
function TabGuaca({historial, saldo, movimientos, onIrDepositos, delivery}){
  const [desde,setDesde]=useState('');
  const [hasta,setHasta]=useState('');
  const [openDia,setOpenDia]=useState({});
  const [liquidaciones,setLiquidaciones]=useState([]);

  useEffect(()=>{
    if(!delivery?.id) return;
    // Cargar liquidaciones del rider
    sb.from('liquidaciones_delivery')
      .select('*')
      .eq('delivery_id',delivery.id)
      .order('creado_at',{ascending:false})
      .limit(20)
      .then(({data})=>{ if(data) setLiquidaciones(data); });
  },[delivery?.id]);

  // historial viene de Supabase: campos reales no normalizados
  const fin = historial.filter(p=>p.estatus==='FINALIZADO'||p.est==='FINALIZADO');
  const hoy = new Date().setHours(0,0,0,0);
  const d = new Date(hoy); d.setDate(d.getDate()-((d.getDay()+6)%7)); const lunSem=d.getTime();
  const ini = new Date(new Date().getFullYear(),new Date().getMonth(),1).getTime();
  let tH=0,pH=0,tS=0,pS=0,tM=0,pM=0;
  const porDia={};
  fin.forEach(p=>{
    // Usar ingreso_delivery (campo real) o gan (campo normalizado)
    const g=parseFloat(p.ingreso_delivery||p.gan||0);
    const tsRaw = p.hora_finalizado||p.ts;
    const ts = tsRaw ? new Date(tsRaw).getTime() : 0;
    const dia = tsRaw ? new Date(tsRaw).toISOString().slice(0,10) : 'sin-fecha';
    if(!porDia[dia])porDia[dia]={t:0,items:[]};
    porDia[dia].t+=g; porDia[dia].items.push({...p,_g:g,_ts:ts});
    if(ts>=hoy){tH+=g;pH++;}
    if(ts>=lunSem){tS+=g;pS++;}
    if(ts>=ini){tM+=g;pM++;}
  });
  let rT=0,rC=0;
  if(desde&&hasta){const d1=new Date(desde+'T00:00:00').getTime(),d2=new Date(hasta+'T23:59:59').getTime();fin.forEach(p=>{const ts=new Date(p.hora_finalizado||p.ts||0).getTime();if(ts>=d1&&ts<=d2){rT+=parseFloat(p.ingreso_delivery||p.gan||0);rC++;}});}
  let nivel='Bronce',stars='⭐',pct=0;
  if(pM>=150){nivel='Oro';stars='⭐⭐⭐';pct=100;}
  else if(pM>=75){nivel='Plata';stars='⭐⭐';pct=Math.round((pM-75)/75*100);}
  else{pct=Math.round(pM/75*100);}

  // MODELO SALDO CORRECTO:
  // saldo_billetera = dinero disponible del rider (recarga y baja con comisiones)
  // Mínimo para operar = MIN_SALDO (L.100 por defecto)
  const bloqueado  = saldo < MIN_SALDO;
  const sBajo      = saldo < MIN_SALDO;
  const sCerca     = saldo >= MIN_SALDO && saldo < MIN_SALDO * 2;
  const sOk        = saldo >= MIN_SALDO * 2;
  const sColor     = sBajo ? '#EF4444' : sCerca ? '#F59E0B' : '#22C55E';
  const sBarPct    = Math.min(100, (saldo / 500) * 100); // barra de saldo disponible

  const dias = Object.keys(porDia).sort().reverse();


  return(
    <div style={{paddingBottom:20}}>

      {/* ── BILLETERA ── */}
      <div style={{margin:12,background:'#1A1A1A',border:`1px solid ${sColor}44`,borderRadius:18,overflow:'hidden'}}>
        <div style={{background:sBajo?'#7f1d1d':sCerca?'#78350f':'#14532d',padding:'11px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:13,fontWeight:800,textTransform:'uppercase',letterSpacing:'.06em',color:'#fff'}}>💳 Mi Billetera</h3>
          <span style={{fontSize:11,color:'rgba(255,255,255,.7)',fontWeight:600}}>Mínimo {fmtL(MIN_SALDO)}</span>
        </div>
        <div style={{padding:16}}>
          {/* Saldo disponible */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:'#888',fontWeight:600,marginBottom:4}}>SALDO DISPONIBLE</div>
              <div style={{fontSize:38,fontWeight:900,color:sColor,lineHeight:1}}>L. {saldo.toFixed(2)}</div>
              <div style={{fontSize:11,color:'#888',marginTop:4}}>
                {bloqueado ? '⛔ Saldo insuficiente — recarga para trabajar' : `Mínimo requerido: L. ${MIN_SALDO}`}
              </div>
            </div>
            <button onClick={onIrDepositos}
              style={{background:'#FF8C00',border:'none',borderRadius:12,padding:'10px 16px',color:'#fff',fontSize:13,fontWeight:800,flexShrink:0}}>
              + Recargar
            </button>
          </div>
          {/* Barra de saldo */}
          <div style={{background:'#2C2C2C',borderRadius:6,height:8,marginBottom:8,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:6,background:sColor,width:`${sBarPct}%`,transition:'width .5s'}}/>
          </div>
          {/* Mensaje estado */}

              <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{fontSize:16,fontWeight:800,color:'#22C55E'}}>L. {info.t.toFixed(2)}</div><span style={{color:'#555',fontSize:18}}>{openDia[dia]?'∨':'›'}</span></div>

      )}

    </div>
  );
}

function DepForm({onEnviar, onConfirm}){
  const [monto,setMonto]=useState('');
  const [file,setFile]=useState(null);
  const [prev,setPrev]=useState(null);
  const [err,setErr]=useState('');
  const hFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const doSet=()=>{setFile(f);const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};
    onConfirm({msg:'¿Usar esta foto como comprobante?',confirmLbl:'Sí, usar esta foto',color:'#22C55E',onSi:doSet});
  };
  const enviar=()=>{
    if(!monto||parseFloat(monto)<=0)return setErr('Ingresa el monto');
    if(!file)return setErr('Sube la foto del comprobante');
    onEnviar(parseFloat(monto));setMonto('');setFile(null);setPrev(null);setErr('');
  };
  return(
    <div style={{margin:12,background:'#1A1A1A',border:'1px solid #333',borderRadius:16,padding:16}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>💳 Recargar Billetera</div>
      <div style={{fontSize:12,color:'#888',marginBottom:14}}>Sube el comprobante y Despacho aprobará la recarga</div>
      <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Monto depositado (L.)</label>
      <input type="number" inputMode="decimal" placeholder="0.00" value={monto} onChange={e=>setMonto(e.target.value)} style={{width:'100%',background:'#232323',border:'1.5px solid #444',borderRadius:12,padding:'15px 14px',color:'#F0F0F0',fontSize:20,fontWeight:800,outline:'none',marginBottom:14}}/>
      <label style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:6}}>Foto del comprobante</label>
      <div onClick={()=>document.getElementById('depInp').click()} style={{background:'#232323',border:`2px ${prev?'solid':'dashed'} ${prev?'#22C55E':'#444'}`,borderRadius:14,padding:prev?0:20,textAlign:'center',overflow:'hidden',marginBottom:14}}>
        {prev?<img src={prev} style={{width:'100%',maxHeight:140,objectFit:'cover',display:'block'}}/>:<><div style={{fontSize:32,marginBottom:6}}>📷</div><div style={{fontSize:14,fontWeight:700}}>Tomar foto del comprobante</div><div style={{fontSize:12,color:'#888',marginTop:4}}>Toca aquí para abrir la cámara</div></>}
      </div>
      <input type="file" id="depInp" accept="image/*" capture="environment" style={{display:'none'}} onChange={hFile}/>
      {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:10}}>{err}</div>}
      <button onClick={enviar} style={{width:'100%',padding:16,borderRadius:14,background:'#FF8C00',color:'#fff',fontSize:16,fontWeight:800}}>Enviar Depósito</button>
      {/* Transferencias de Somar al rider */}
      {liquidaciones&&liquidaciones.filter(l=>l.estatus==='PENDIENTE').length>0&&(
        <div style={{margin:'12px 12px 0',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.3)',borderRadius:14,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'#3B82F6',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>
            💳 Somar te debe · {liquidaciones.filter(l=>l.estatus==='PENDIENTE').length} transferencia{liquidaciones.filter(l=>l.estatus==='PENDIENTE').length!==1?'s':''}
          </div>
          {liquidaciones.filter(l=>l.estatus==='PENDIENTE').map(l=>(
            <div key={l.id} style={{background:'rgba(0,0,0,.2)',borderRadius:10,padding:'10px 12px',marginBottom:6}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:12,color:'#ccc',flex:1,marginRight:8}}>{l.descripcion||'Liquidación pendiente'}</div>
                <div style={{fontSize:17,fontWeight:900,color:'#3B82F6',flexShrink:0}}>L. {parseFloat(l.monto_liquidar).toFixed(2)}</div>
              </div>
              <div style={{fontSize:10,color:'#666',marginTop:3}}>⏳ {new Date(l.creado_at).toLocaleDateString('es-HN',{day:'2-digit',month:'short',timeZone:'America/Tegucigalpa'})}</div>
            </div>
          ))}
        </div>
      )}
      {liquidaciones&&liquidaciones.filter(l=>l.estatus==='LIQUIDADO').length>0&&(
        <div style={{margin:'6px 12px 0'}}>
          {liquidaciones.filter(l=>l.estatus==='LIQUIDADO').slice(0,3).map(l=>(
            <div key={l.id} style={{background:'#1A1A1A',borderRadius:10,padding:'10px 12px',marginBottom:6,borderLeft:'3px solid #22C55E'}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <div style={{fontSize:12,color:'#ccc',flex:1}}>{l.descripcion||'Transferencia recibida'}</div>
                <div style={{fontSize:14,fontWeight:800,color:'#22C55E'}}>L. {parseFloat(l.monto_liquidar).toFixed(2)}</div>
              </div>
              <div style={{fontSize:10,color:'#555',marginTop:2}}>✅ Recibido</div>
            </div>
          ))}
        </div>
      )}

    </div>
  );
}

function AuthScreen({onLogin}){
  const [vista,setVista]=useState('login');
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');
  const [cargando,setCargando]=useState(false);
  const [reg,setReg]=useState({nombre:'',celular:'',email:'',pwd:'',pwd2:''});
  const [regErr,setRegErr]=useState('');
  const [regCargando,setRegCargando]=useState(false);
  const [duiFile,setDuiFile]=useState(null);
  const [motoFile,setMotoFile]=useState(null);
  const [duiPrev,setDuiPrev]=useState(null);
  const [motoPrev,setMotoPrev]=useState(null);
  const _reg = useRef(false);

  const inp = {width:'100%',background:'#232323',border:'1.5px solid #333',borderRadius:10,padding:'13px 14px',color:'#F0F0F0',fontSize:15,outline:'none'};

  const login = async () => {
    if(!email||!pwd) return setErr('Completa todos los campos');
    setCargando(true); setErr('');
    const {error} = await sb.auth.signInWithPassword({email, password:pwd});
    if(error) setErr('Correo o contraseña incorrectos');
    setCargando(false);
  };

  const registro = async () => {
    if(!reg.nombre||!reg.celular||!reg.email||!reg.pwd) return setRegErr('Completa todos los campos');
    if(reg.pwd!==reg.pwd2) return setRegErr('Las contraseñas no coinciden');
    if(reg.pwd.length<8) return setRegErr('Contraseña mínimo 8 caracteres');
    if(!duiFile) return setRegErr('Sube la foto del DUI');
    if(!motoFile) return setRegErr('Sube la foto del vehículo');
    setRegCargando(true); setRegErr(''); _reg.current=true;
    try {
      const {data:su,error:suErr}=await sb.auth.signUp({email:reg.email,password:reg.pwd});
      if(suErr){setRegErr(suErr.message);return;}
      const uid=su?.user?.id;
      if(!uid){setRegErr('Error al crear cuenta');return;}
      if(su.session?.access_token) await sb.auth.setSession({access_token:su.session.access_token,refresh_token:su.session.refresh_token});
      // Subir fotos
      let duiUrl=null, motoUrl=null;
      try {
        const up = async (f,n) => {
          const ext=f.name.split('.').pop()?.toLowerCase()||'jpg';
          const {data,error}=await sb.storage.from('delivery-docs').upload(`${uid}/${n}_${Date.now()}.${ext}`,f,{cacheControl:'3600',upsert:true,contentType:f.type});
          if(error) return null;
          const {data:u}=await sb.storage.from('delivery-docs').createSignedUrl(data.path,60*60*24*365*10);
          return u?.signedUrl||null;
        };
        duiUrl=await up(duiFile,'dui'); motoUrl=await up(motoFile,'moto');
      } catch(e){ console.warn('fotos:',e); }
      // Insert aplicacion
      const {data:{session:ses}}=await sb.auth.getSession();
      await fetch(SUPA_URL+'/rest/v1/aplicaciones_delivery',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_ANON,'Authorization':'Bearer '+(ses?.access_token||SUPA_ANON),'Prefer':'return=minimal'},
        body:JSON.stringify({nombre:reg.nombre,celular:reg.celular,correo:reg.email,identidad_delantera_url:duiUrl,moto_propia_url:motoUrl,estatus:'PENDIENTE',notas:'auth_uid:'+uid}),
      });
      _reg.current=false;
      setVista('pendiente');
    } finally { setRegCargando(false); _reg.current=false; }
  };

  const prevFile=(f,setPv)=>{const r=new FileReader();r.onload=e=>setPv(e.target.result);r.readAsDataURL(f);};

  if(vista==='pendiente') return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'radial-gradient(ellipse at top,#1f0a00,#0F0F0F)'}}>
      <div style={{background:'#1A1A1A',border:'1px solid #333',borderRadius:20,padding:28,width:'100%',maxWidth:400,textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:16}}>⏳</div>
        <h2 style={{fontSize:19,fontWeight:700,marginBottom:8}}>Solicitud Enviada</h2>
        <p style={{color:'#888',fontSize:14,lineHeight:1.6}}>Tu cuenta está siendo revisada por Despacho.<br/><br/>Te notificaremos cuando sea aprobada.</p>
        <button onClick={()=>sb.auth.signOut().then(()=>setVista('login'))} style={{marginTop:24,background:'none',border:'1px solid #333',borderRadius:10,padding:'10px 20px',color:'#888',fontSize:14,width:'100%'}}>Cerrar sesión</button>
      </div>
    </div>
  );

  if(vista==='registro') return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at top,#1f0a00,#0F0F0F)',padding:20,overflowY:'auto'}}>

// ─── CHAT ─────────────────────────────────────────────────
function TabChat({delivery}){
  const [msgs,setMsgs]=useState([]);
  const [texto,setTexto]=useState('');
  const [cargando,setCargando]=useState(true);
  const [enviando,setEnviando]=useState(false);
  const [imgFile,setImgFile]=useState(null);
  const [imgPreview,setImgPreview]=useState(null);
  const listRef=useRef(null);
  const chRef=useRef(null);

  useEffect(()=>{
    if(!delivery?.id)return;
    const cargar=async()=>{
      setCargando(true);
      const {data}=await sb.from('chat_mensajes').select('*').eq('delivery_id',delivery.id).order('created_at',{ascending:true}).limit(100);
      setMsgs(data||[]);setCargando(false);
      await sb.from('chat_mensajes').update({leido:true,leido_at:new Date().toISOString()}).eq('delivery_id',delivery.id).eq('remitente','DESPACHO').eq('leido',false);
    };
    cargar();
    chRef.current=sb.channel('chat_'+delivery.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_mensajes',filter:'delivery_id=eq.'+delivery.id},p=>{
        setMsgs(ms=>[...ms,p.new]);
        if(p.new.remitente==='DESPACHO') sb.from('chat_mensajes').update({leido:true,leido_at:new Date().toISOString()}).eq('id',p.new.id);
      }).subscribe();
    return()=>{if(chRef.current)sb.removeChannel(chRef.current);};
  },[delivery?.id]);

  useEffect(()=>{ if(listRef.current)listRef.current.scrollTop=listRef.current.scrollHeight; },[msgs]);

  const enviar=async()=>{
    const msg=texto.trim();
    if((!msg&&!imgFile)||enviando||!delivery?.id)return;
    setEnviando(true);setTexto('');
    let imagen_url=null;
    if(imgFile){
      try{
        const fd=new FormData();fd.append('file',imgFile);fd.append('upload_preset','somar_riders');fd.append('folder','chat');
        const r=await fetch('https://api.cloudinary.com/v1_1/drkaxsziu/image/upload',{method:'POST',body:fd});
        const d=await r.json();imagen_url=d.secure_url;
      }catch(e){console.error('[chat img]',e);}
      setImgFile(null);setImgPreview(null);
    }
    const {error}=await sb.from('chat_mensajes').insert({delivery_id:delivery.id,remitente:'DELIVERY',mensaje:msg||null,imagen_url});
    if(error)setTexto(msg);
    setEnviando(false);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 68px - 56px)',minHeight:300}}>
      <div style={{background:'#1A1A1A',borderBottom:'1px solid #333',padding:'12px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:38,height:38,background:'#FF8C00',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>📟</div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>Despacho Somar Express</div>
          <div style={{fontSize:11,color:'#22C55E',display:'flex',alignItems:'center',gap:4}}><div style={{width:6,height:6,borderRadius:'50%',background:'#22C55E',animation:'pulse 2s infinite'}}/>En línea</div>
        </div>
      </div>
      <div ref={listRef} style={{flex:1,overflowY:'auto',padding:'12px',display:'flex',flexDirection:'column',gap:8}}>
        {cargando&&<div style={{textAlign:'center',color:'#888',padding:20}}>Cargando...</div>}
        {!cargando&&msgs.length===0&&<div style={{textAlign:'center',padding:'40px 24px'}}><div style={{fontSize:40,marginBottom:10}}>💬</div><div style={{fontSize:14,color:'#888'}}>Escríbele a Despacho aquí</div></div>}
        {msgs.map(m=>{
          const mio=m.remitente==='DELIVERY';
          const agente=m.remitente_nombre;
          // Paleta de colores por agente
          const COLORES=['#FF8C00','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F59E0B'];
          const colorIdx=agente?Math.abs(agente.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%COLORES.length:0;
          const aColor=COLORES[colorIdx];
          const hora=new Date(m.created_at).toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tegucigalpa'});
          return(
            <div key={m.id} style={{display:'flex',justifyContent:mio?'flex-end':'flex-start',marginBottom:4}}>
              {!mio&&<div style={{width:28,height:28,background:aColor,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0,marginRight:6,alignSelf:'flex-end',color:'#fff'}}>
                {agente?agente.charAt(0).toUpperCase():'D'}
              </div>}
              <div style={{maxWidth:'78%'}}>
                {!mio&&agente&&<div style={{fontSize:10,fontWeight:700,color:aColor,marginBottom:2,paddingLeft:2}}>{agente}</div>}
                <div style={{background:mio?'#FF8C00':'#232323',color:'#F0F0F0',borderRadius:mio?'18px 18px 4px 18px':'18px 18px 18px 4px',padding:'10px 14px',fontSize:14,lineHeight:1.5,
                  ...(mio?{}:{borderLeft:`2px solid ${aColor}`})}}>
                  {m.mensaje&&<div>{m.mensaje}</div>}
                  {m.imagen_url&&<img src={m.imagen_url} onClick={()=>window.open(m.imagen_url)} style={{maxWidth:'200px',maxHeight:'180px',borderRadius:10,display:'block',marginTop:m.mensaje?6:0,cursor:'pointer',objectFit:'cover'}} loading="lazy"/>}
                </div>
                <div style={{fontSize:10,color:'#555',marginTop:3,textAlign:mio?'right':'left'}}>
                  {hora}{mio&&<span style={{marginLeft:4}}>{m.leido?'✓✓':'✓'}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:'#1A1A1A',borderTop:'1px solid #333',padding:'8px 12px',display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
        {imgPreview&&<div style={{position:'relative',display:'inline-block'}}>
          <img src={imgPreview} style={{height:60,borderRadius:8,objectFit:'cover'}}/>
          <button onClick={()=>{setImgFile(null);setImgPreview(null);}} style={{position:'absolute',top:-6,right:-6,width:18,height:18,borderRadius:'50%',background:'#EF4444',border:'none',color:'#fff',fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>}
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>document.getElementById('chat-img-del').click()} style={{width:38,height:38,borderRadius:10,background:'#2C2C2C',border:'1px solid #444',color:'#888',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>📎</button>
          <input type="file" id="chat-img-del" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){setImgFile(f);const r=new FileReader();r.onload=ev=>setImgPreview(ev.target.result);r.readAsDataURL(f);}e.target.value='';}}/>
          <input value={texto} onChange={e=>setTexto(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}}} placeholder="Escribe un mensaje..." style={{flex:1,background:'#2C2C2C',border:'1px solid #444',borderRadius:24,padding:'12px 16px',color:'#F0F0F0',fontSize:14,outline:'none'}}/>
          <button onClick={enviar} disabled={(!texto.trim()&&!imgFile)||enviando} style={{width:48,height:48,borderRadius:'50%',background:(texto.trim()||imgFile)?'#FF8C00':'#2C2C2C',color:(texto.trim()||imgFile)?'#fff':'#555',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>{enviando?'…':'➤'}</button>
        </div>
      </div>
    </div>
  );
}


// ─── NORMALIZAR PEDIDO (campos BD → campos cortos del UI) ────────────────────
function normalizarPedido(p, asigId=null) {
  // Calcular ganancia estimada (70% de tarifa_envio)
  const tarifa = parseFloat(p.tarifa_envio || 0);
  const gan = parseFloat(p.ingreso_delivery || p.gan || tarifa * 0.7 || 0);
  // Calcular distancia aproximada si hay GPS
  let km = parseFloat(p.distancia_km || 0);
  return {
    ...p,
    _asigId: asigId || p._asigId,
    // Campos cortos que usa el UI
    com:   p.nombre_comercio || p.com || '—',
    ciudad:p.ciudad_destino  || p.ciudad || '—',
    km:    km,
    gan:   gan,
    pago:  p.metodo_pago     || p.pago || 'EFECTIVO',
    tipo:  p.tipo            || 'DELIVERY',
    // Campos de detalle
    no:    p.no_orden        || p.no || '—',
    dr:    p.direccion_recogida   || p.dr || '',
    de:    p.direccion_entrega    || p.de || '',
    co:    p.ubicacion_recogida_gps || p.co || '',
    cd:    p.ubicacion_entrega_gps  || p.cd || '',
    mc:    parseFloat(p.monto_cobrar || p.mc || 0),
    cp:    parseFloat(p.monto_recibido_efectivo || p.cp || 0),
    enc:   p.datos_encargo   || p.enc || '',
    me:    parseFloat(p.monto_pagado_en_comercio || p.me || 0),
    est:   p.estatus         || p.est || 'ACEPTADO',
    // Datos reales del cliente
    nombre_cliente:       p.nombre_cliente       || p.nombre_destinatario || '',
    telefono_cliente:     p.celular_cliente       || p.telefono_destinatario || p.telefono_cliente || '',
    nombre_destinatario:  p.nombre_destinatario   || p.nombre_cliente || '',
    telefono_destinatario:p.telefono_destinatario || p.celular_cliente || '',
    // Descripción y observaciones
    desc:  p.descripcion_paquete || p.descripcion || p.desc || '',
    obs:   p.observaciones || p.obs || '',
  };
}
